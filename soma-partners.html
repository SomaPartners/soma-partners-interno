<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soma Partners</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --navy: #0b1e30;
      --white: #ffffff;
    }

    html, body {
      width: 100%; height: 100vh;
      overflow: hidden;
      background: var(--navy);
      font-family: 'Montserrat', sans-serif;
      color: var(--white);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
    }

    /* ════════════ LOGO ════════════ */
    .logo-bar {
      padding: 32px 0 0;
      display: flex;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 18px;
      user-select: none;
    }

    .logo-soma {
      font-size: 21px;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    .logo-pipe {
      width: 1px;
      height: 30px;
      background: rgba(255,255,255,0.45);
    }

    .logo-partners {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 5px;
      text-transform: uppercase;
    }

    /* ════════════ HERO ════════════ */
    .hero {
      text-align: center;
      flex-shrink: 0;
      line-height: 1.08;
      padding: 0 20px;
    }

    .hero-thin {
      font-size: clamp(32px, 4.6vw, 62px);
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .hero-bold {
      font-size: clamp(36px, 5.2vw, 70px);
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ════════════ CARDS ROW ════════════ */
    .cards-row {
      width: 100%;
      display: flex;
      align-items: stretch;
      padding: 0 36px;
      gap: 5px;
      flex: 1;
      max-height: 52vh;
      margin-bottom: 0;
    }

    .card {
      flex: 1;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      border-radius: 1px;
    }

    /* ─ background images ─ */
    .card-img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      z-index: 1;
    }

    /* CSS placeholder shown when no <img> is present */
    .card-placeholder {
      position: absolute;
      inset: 0;
    }

    /* Concierge — luxury dark office feel */
    .card-concierge .card-placeholder {
      background:
        radial-gradient(ellipse at 60% 30%, rgba(30,55,80,0.9) 0%, rgba(8,18,28,1) 70%),
        linear-gradient(135deg, #1c3349 0%, #0a1a28 50%, #060f1a 100%);
    }

    /* Wealth — trading screens, green/teal tint */
    .card-wealth .card-placeholder {
      background:
        radial-gradient(ellipse at 40% 60%, rgba(0,30,20,0.95) 0%, rgba(5,12,10,1) 70%),
        linear-gradient(135deg, #0a1f10 0%, #060d08 60%, #040b0a 100%);
    }

    /* Eventos — warm morning meeting */
    .card-eventos .card-placeholder {
      background:
        radial-gradient(ellipse at 50% 40%, rgba(40,38,48,0.95) 0%, rgba(12,15,22,1) 70%),
        linear-gradient(135deg, #1e1e2a 0%, #0d0f18 60%, #080b14 100%);
    }

    /* Dark tint always visible */
    .card-tint {
      position: absolute;
      inset: 0;
      background: rgba(8, 20, 34, 0.38);
      pointer-events: none;
      z-index: 2;
    }

    /* Bottom gradient + label */
    .card-footer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 48px 22px 22px;
      background: linear-gradient(to top, rgba(6,16,26,0.92) 0%, transparent 100%);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      z-index: 3;
    }
    .card:hover .card-footer { opacity: 1; transform: translateY(0); }

    .card-title {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    .card-subtitle {
      font-size: 10.5px;
      font-weight: 400;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.65);
      margin-top: 5px;
    }


  </style>
</head>
<body>

  <!-- ── LOGO ── -->
  <div class="logo-bar">
    <div class="logo">
      <span class="logo-soma">Soma</span>
      <div class="logo-pipe"></div>
      <span class="logo-partners">Partners</span>
    </div>
  </div>

  <!-- ── HERO ── -->
  <div class="hero">
    <div class="hero-thin">Cada passo soma.</div>
    <div class="hero-bold">Cada decisão conta.</div>
  </div>

  <!-- ── CARDS ── -->
  <div class="cards-row">

    <!-- CONCIERGE -->
    <div class="card card-concierge" onclick="window.location.href='concierge.html'">
      <div class="card-placeholder"></div>
      <img class="card-img" src="img/concierge.jpg.png" alt="Concierge" />
      <div class="card-tint"></div>
      <div class="card-footer">
        <div class="card-title">Concierge</div>
        <div class="card-subtitle">CRM Operacional &amp; Financeiro</div>
      </div>
    </div>

    <!-- WEALTH -->
    <div class="card card-wealth" onclick="window.location.href='wealth.html'">
      <div class="card-placeholder"></div>
      <img class="card-img" src="img/wealth.jpg.png" alt="Wealth" />
      <div class="card-tint"></div>
      <div class="card-footer">
        <div class="card-title">Wealth</div>
        <div class="card-subtitle">CRM Comercial &amp; Relacionamento</div>
      </div>
    </div>

    <!-- EVENTOS -->
    <div class="card card-eventos" onclick="window.location.href='eventos.html'">
      <div class="card-placeholder"></div>
      <img class="card-img" src="img/eventos.jpg.png" alt="Eventos" />
      <div class="card-tint"></div>
      <div class="card-footer">
        <div class="card-title">Eventos</div>
        <div class="card-subtitle">Gestão Completa de Eventos</div>
      </div>
    </div>

  </div>


</body>
</html>
