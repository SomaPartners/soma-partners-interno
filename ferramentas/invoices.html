<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Invoice Generator — Soma Partners</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0b1e30;--blue:#3b8bff;--gold:#c9963c;--border:rgba(255,255,255,0.09);--text:#fff;--muted:rgba(255,255,255,0.45);--red:#3b8bff}
html,body{min-height:100%;background:var(--navy);font-family:'Montserrat',sans-serif;color:var(--text)}

/* NAV */
.topnav{background:rgba(11,30,48,0.98);border-bottom:1px solid var(--border);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-left{display:flex;align-items:center;gap:14px}
.nav-logo{display:flex;align-items:center;gap:12px;cursor:pointer;text-decoration:none}
.logo-soma{font-size:17px;font-weight:300;color:#fff;letter-spacing:.5px}
.logo-pipe{width:1px;height:20px;background:rgba(255,255,255,0.35)}
.logo-partners{font-size:10px;font-weight:700;letter-spacing:5px;color:#fff;text-transform:uppercase}
.nav-sep{width:1px;height:24px;background:rgba(255,255,255,0.1)}
.nav-title{font-size:13px;font-weight:800;color:#fff;letter-spacing:.3px}
.btn-back{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:7px;font-size:11px;font-weight:700;font-family:'Montserrat',sans-serif;cursor:pointer;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.7);transition:all .18s}
.btn-back:hover{background:rgba(255,255,255,0.12);color:#fff}
.btn-back svg{width:12px;height:12px;stroke:currentColor;stroke-width:2.5;fill:none}

/* LAYOUT */
.container{max-width:860px;margin:0 auto;padding:40px 32px 80px}
.page-title{font-size:24px;font-weight:900;letter-spacing:-.4px;margin-bottom:4px}
.page-sub{font-size:12px;color:var(--muted);margin-bottom:36px}

/* SECTION */
.section{margin-bottom:28px}
.section-label{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:rgba(201,150,60,0.2)}

/* FIELDS */
.row{display:grid;gap:14px;margin-bottom:14px}
.row-2{grid-template-columns:1fr 1fr}
.row-3{grid-template-columns:1fr 1fr 1fr}
.row-4{grid-template-columns:1fr 1fr 1fr 1fr}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.field input,.field textarea,.field select{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 12px;font-size:13px;font-family:'Montserrat',sans-serif;font-weight:400;color:#fff;outline:none;transition:border-color .18s;width:100%}
.field input::placeholder,.field textarea::placeholder{color:rgba(255,255,255,0.2);font-style:italic}
.field textarea{resize:vertical;min-height:80px;line-height:1.6}
.field input:focus,.field textarea:focus,.field select:focus{border-color:rgba(201,150,60,0.5)}
.field select option{background:#0d2035;color:#fff}

/* ITEMS TABLE */
.items-header{display:grid;grid-template-columns:80px 1fr 140px 36px;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:8px}
.items-header span{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.item-row{display:grid;grid-template-columns:80px 1fr 140px 36px;gap:10px;margin-bottom:8px;align-items:start}
.item-row input{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 12px;font-size:13px;font-family:'Montserrat',sans-serif;color:#fff;outline:none;width:100%;transition:border-color .18s}
.item-row input:focus{border-color:rgba(201,150,60,0.5)}
.btn-remove{width:32px;height:40px;border-radius:8px;border:1px solid rgba(255,80,80,0.25);background:rgba(255,80,80,0.06);color:rgba(255,100,100,0.7);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0}
.btn-remove:hover{background:rgba(255,80,80,0.15);color:#ff6060;border-color:rgba(255,80,80,0.4)}
.btn-add{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px dashed rgba(201,150,60,0.35);background:transparent;color:rgba(201,150,60,0.7);font-size:11px;font-weight:700;font-family:'Montserrat',sans-serif;cursor:pointer;transition:all .18s;margin-top:4px}
.btn-add:hover{background:rgba(201,150,60,0.08);color:var(--gold);border-color:rgba(201,150,60,0.6)}

/* TEMPLATES */
.templates-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:4px}
.tpl-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.09);border-radius:12px;padding:16px 18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;text-align:left;width:100%}
.tpl-card:hover{background:rgba(59,139,255,0.07);border-color:rgba(59,139,255,0.35);transform:translateY(-2px)}
.tpl-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--blue);opacity:.7}
.tpl-name{font-size:13px;font-weight:700;color:#fff;margin-bottom:3px;padding-right:24px}
.tpl-sub{font-size:11px;color:var(--muted);line-height:1.5}
.tpl-badge{display:inline-block;margin-top:10px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 7px;border-radius:4px;background:rgba(59,139,255,0.12);color:rgba(59,139,255,0.9);border:1px solid rgba(59,139,255,0.2)}
.tpl-delete{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:5px;border:none;background:rgba(255,80,80,0.08);color:rgba(255,100,100,0.5);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;line-height:1}
.tpl-delete:hover{background:rgba(255,80,80,0.2);color:#ff6060}
/* Save template bar */
.save-tpl-bar{display:flex;gap:10px;align-items:center;margin-top:16px}
.save-tpl-bar input{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:9px 12px;font-size:12px;font-family:'Montserrat',sans-serif;color:#fff;outline:none;transition:border-color .18s}
.save-tpl-bar input:focus{border-color:rgba(59,139,255,0.5)}
.save-tpl-bar input::placeholder{color:rgba(255,255,255,0.2);font-style:italic}
.btn-save-tpl{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;border:1px solid rgba(59,139,255,0.3);background:rgba(59,139,255,0.1);color:rgba(59,139,255,0.9);font-size:11px;font-weight:700;font-family:'Montserrat',sans-serif;cursor:pointer;white-space:nowrap;transition:all .18s}
.btn-save-tpl:hover{background:rgba(59,139,255,0.2);border-color:rgba(59,139,255,0.5);color:#fff}

/* GENERATE BUTTON */
.btn-generate{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:16px;border-radius:12px;border:none;background:linear-gradient(135deg,#c9963c,#e0b060);color:#0b1e30;font-size:14px;font-weight:800;font-family:'Montserrat',sans-serif;cursor:pointer;transition:all .2s;letter-spacing:.3px;margin-top:32px}
.btn-generate:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(201,150,60,0.3)}
.btn-generate svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.5;fill:none}
</style>
</head>
<body>

<nav class="topnav">
  <div class="nav-left">
    <a class="nav-logo" href="../soma-partners.html">
      <span class="logo-soma">Soma</span>
      <span class="logo-pipe"></span>
      <span class="logo-partners">Partners</span>
    </a>
    <div class="nav-sep"></div>
    <span class="nav-title">Gerador de Invoice</span>
  </div>
  <button class="btn-back" onclick="window.location.href='../ferramentas.html'">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Voltar
  </button>
</nav>

<div class="container">
  <div class="page-title">Gerador de Invoice</div>
  <div class="page-sub">Preencha os campos e clique em Gerar para abrir o invoice pronto para imprimir ou salvar como PDF.</div>

  <!-- TEMPLATES -->
  <div class="section" id="section-templates" style="display:none">
    <div class="section-label">Templates Salvos</div>
    <div class="templates-grid" id="templates-grid">
      <!-- rendered by JS -->
    </div>
  </div>

  <!-- INVOICE INFO -->
  <div class="section">
    <div class="section-label">Invoice</div>
    <div class="row row-4">
      <div class="field">
        <label>Número do Invoice</label>
        <input type="text" autocomplete="off" id="inv-number" placeholder="ex: 001/26"/>
      </div>
      <div class="field">
        <label>Data de Emissão</label>
        <input type="date" id="inv-date" autocomplete="off"/>
      </div>
      <div class="field">
        <label>Moeda</label>
        <select id="inv-currency">
          <option value="USD">USD — Dólar</option>
          <option value="EUR">EUR — Euro</option>
          <option value="BRL">BRL — Real</option>
          <option value="GBP">GBP — Libra</option>
        </select>
      </div>
      <div class="field">
        <label>Idioma</label>
        <select id="inv-lang">
          <option value="PT">🇧🇷 Português</option>
          <option value="EN">🇺🇸 English</option>
        </select>
      </div>
    </div>
  </div>

  <!-- CREDITOR -->
  <div class="section">
    <div class="section-label">Credor (quem emite)</div>
    <div class="row row-2">
      <div class="field">
        <label>Nome Completo / Empresa</label>
        <input type="text" autocomplete="off" id="cred-name" placeholder="Seu nome ou empresa"/>
      </div>
      <div class="field">
        <label>Endereço</label>
        <input type="text" autocomplete="off" id="cred-address" placeholder="Rua, cidade, estado, país"/>
      </div>
    </div>
  </div>

  <!-- PAYER -->
  <div class="section">
    <div class="section-label">Pagador (quem paga)</div>
    <div class="row row-2">
      <div class="field">
        <label>Nome / Empresa</label>
        <input type="text" autocomplete="off" id="payer-name" placeholder="Nome ou razão social"/>
      </div>
      <div class="field">
        <label>Endereço Completo</label>
        <textarea autocomplete="off" id="payer-address" placeholder="Rua&#10;Cidade&#10;País"></textarea>
      </div>
    </div>
    <div class="row row-2">
      <div class="field">
        <label>Tax ID 1 (ex: BTW, CNPJ, VAT) — opcional</label>
        <input type="text" autocomplete="off" id="payer-tax1" placeholder="ex: CNPJ: 00.000.000/0001-00"/>
      </div>
      <div class="field">
        <label>Tax ID 2 (ex: KvK, IE) — opcional</label>
        <input type="text" autocomplete="off" id="payer-tax2" placeholder="ex: IE: 000000"/>
      </div>
    </div>
  </div>

  <!-- PAYMENT DETAILS -->
  <div class="section">
    <div class="section-label">Dados Bancários</div>
    <div class="row row-2">
      <div class="field">
        <label>Beneficiário</label>
        <input type="text" autocomplete="off" id="pay-beneficiary" placeholder="Nome do titular da conta"/>
      </div>
      <div class="field">
        <label>Banco</label>
        <input type="text" autocomplete="off" id="pay-bank" placeholder="Nome do banco"/>
      </div>
    </div>
    <div class="row row-3">
      <div class="field">
        <label>Número da Conta</label>
        <input type="text" autocomplete="off" id="pay-account" placeholder="Número da conta"/>
      </div>
      <div class="field">
        <label>ABA Routing / PIX / IBAN</label>
        <input type="text" autocomplete="off" id="pay-aba" placeholder="Código de roteamento"/>
      </div>
      <div class="field">
        <label>SWIFT / BIC</label>
        <input type="text" autocomplete="off" id="pay-swift" placeholder="ex: WFBIUS6S"/>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Observação — opcional</label>
        <input type="text" autocomplete="off" id="pay-note" placeholder="Nota de rodapé em itálico abaixo dos dados bancários"/>
      </div>
    </div>
    <div class="save-tpl-bar">
      <input type="text" autocomplete="off" id="tpl-name-input" placeholder="Nome do template (ex: Diego Lima — Wells Fargo)"/>
      <button class="btn-save-tpl" onclick="saveTemplate()">💾 Salvar Template</button>
    </div>
  </div>

  <!-- LINE ITEMS -->
  <div class="section">
    <div class="section-label">Itens</div>
    <div class="items-header">
      <span>Qty</span>
      <span>Descrição</span>
      <span>Valor Total</span>
      <span></span>
    </div>
    <div id="items-list">
      <!-- items added by JS -->
    </div>
    <button class="btn-add" onclick="addItem()">+ Adicionar Item</button>
  </div>

  <button class="btn-generate" onclick="generateInvoice()">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    Gerar Invoice
  </button>
</div>

<script>
if(sessionStorage.getItem('soma_auth')!=='1'){window.location.href='../login.html';}

// ── Helpers ───────────────────────────────────────────────────────────────────
function today() { return new Date().toISOString().split('T')[0]; }
function pad(n,len){return String(n).padStart(len||2,'0');}

// Auto invoice number for current month: 007/26 format
function autoInvNumber() {
  var d = new Date();
  return pad(d.getMonth()+1,3) + '/' + String(d.getFullYear()).slice(-2);
}

// First day of current month: YYYY-MM-01
function firstOfMonth() {
  var d = new Date();
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-01';
}

// ── Templates (localStorage) ──────────────────────────────────────────────────
var TEMPLATES_KEY = 'soma_invoice_templates';

function getTemplates() {
  try { return JSON.parse(localStorage.getItem(TEMPLATES_KEY)) || []; }
  catch(e) { return []; }
}

function saveTemplates(arr) {
  localStorage.setItem(TEMPLATES_KEY, JSON.stringify(arr));
}

function renderTemplates() {
  var list = getTemplates();
  var grid = document.getElementById('templates-grid');
  grid.innerHTML = list.map(function(t) {
    var sub = [t.bank, t.credAddress].filter(Boolean).join(' · ');
    return '<div style="position:relative">'
      + '<button class="tpl-card" onclick="loadTemplate(\'' + t.id + '\')">'
      + '<div class="tpl-name">' + t.name + '</div>'
      + (sub ? '<div class="tpl-sub">' + sub + '</div>' : '')
      + '<span class="tpl-badge">Carregar</span>'
      + '</button>'
      + '<button class="tpl-delete" onclick="deleteTemplate(\'' + t.id + '\',event)" title="Remover template">×</button>'
      + '</div>';
  }).join('');
  document.getElementById('section-templates').style.display = list.length ? '' : 'none';
}

function loadTemplate(id) {
  var list = getTemplates();
  var t = list.find(function(x){ return x.id === id; });
  if (!t) return;
  document.getElementById('cred-name').value       = t.credName     || '';
  document.getElementById('cred-address').value    = t.credAddress  || '';
  document.getElementById('payer-name').value      = t.payerName    || '';
  document.getElementById('payer-address').value   = t.payerAddress || '';
  document.getElementById('payer-tax1').value      = t.payerTax1   || '';
  document.getElementById('payer-tax2').value      = t.payerTax2   || '';
  document.getElementById('pay-beneficiary').value = t.beneficiary  || '';
  document.getElementById('pay-bank').value        = t.bank         || '';
  document.getElementById('pay-account').value     = t.account      || '';
  document.getElementById('pay-aba').value         = t.aba          || '';
  document.getElementById('pay-swift').value       = t.swift        || '';
  document.getElementById('pay-note').value        = t.payNote      || '';
  document.getElementById('cred-name').scrollIntoView({behavior:'smooth', block:'center'});
}

function saveTemplate() {
  var name = document.getElementById('tpl-name-input').value.trim();
  if (!name) { document.getElementById('tpl-name-input').focus(); return; }
  var t = {
    id:          Date.now().toString(),
    name:        name,
    credName:    document.getElementById('cred-name').value.trim(),
    credAddress: document.getElementById('cred-address').value.trim(),
    payerName:   document.getElementById('payer-name').value.trim(),
    payerAddress:document.getElementById('payer-address').value.trim(),
    payerTax1:   document.getElementById('payer-tax1').value.trim(),
    payerTax2:   document.getElementById('payer-tax2').value.trim(),
    beneficiary: document.getElementById('pay-beneficiary').value.trim(),
    bank:        document.getElementById('pay-bank').value.trim(),
    account:     document.getElementById('pay-account').value.trim(),
    aba:         document.getElementById('pay-aba').value.trim(),
    swift:       document.getElementById('pay-swift').value.trim(),
    payNote:     document.getElementById('pay-note').value.trim()
  };
  var list = getTemplates();
  list.push(t);
  saveTemplates(list);
  document.getElementById('tpl-name-input').value = '';
  renderTemplates();
  document.getElementById('section-templates').scrollIntoView({behavior:'smooth', block:'start'});
}

function deleteTemplate(id, e) {
  e.stopPropagation();
  if (!confirm('Remover este template?')) return;
  var list = getTemplates().filter(function(t){ return t.id !== id; });
  saveTemplates(list);
  renderTemplates();
}

// Init
renderTemplates();

// Set today as default date
document.getElementById('inv-date').value = today();

// Add initial item
addItem();

function addItem(qty, desc, val) {
  var list = document.getElementById('items-list');
  var idx = list.children.length;
  var row = document.createElement('div');
  row.className = 'item-row';
  var qtyVal  = qty  || String(idx+1).padStart(2,'0');
  var descVal = desc || '';
  var valVal  = val  || '';
  row.innerHTML =
    '<input type="text" autocomplete="off" placeholder="01" value="' + qtyVal + '" class="item-qty"/>'
    + '<input type="text" autocomplete="off" placeholder="Descrição do serviço" value="' + descVal.replace(/"/g,'&quot;') + '" class="item-desc"/>'
    + '<input type="text" autocomplete="off" placeholder="1,000.00" value="' + valVal + '" class="item-val"/>'
    + '<button class="btn-remove" onclick="removeItem(this)" title="Remover">×</button>';
  list.appendChild(row);
}

function removeItem(btn) {
  var list = document.getElementById('items-list');
  if (list.children.length > 1) btn.parentElement.remove();
}

function v(id) { return (document.getElementById(id)||{}).value || ''; }

function formatDate(d) {
  if (!d) return '';
  var p = d.split('-');
  return p[1] + '/' + p[2] + '/' + p[0];
}

var TRANSLATIONS = {
  PT: {
    date:        'Data',
    payer:       'Pagador',
    creditor:    'Credor',
    bankDetails: 'Dados Bancários',
    beneficiary: 'Beneficiário',
    bank:        'Banco',
    accountNum:  'Número da Conta',
    abaRouting:  'ABA Routing Number',
    swift:       'SWIFT / BIC',
    currency:    'Moeda',
    qty:         'Qtd',
    description: 'Descrição',
    totalAmount: 'Valor Total',
    totalDue:    'Total a Pagar em',
    thanks:      'Obrigado!',
    issuedOn:    'Emitido em',
    valuesIn:    'Valores em',
    printBtn:    '🖨 Imprimir / Salvar PDF',
    closeBtn:    '✕ Fechar'
  },
  EN: {
    date:        'Date',
    payer:       'Payer',
    creditor:    'Creditor',
    bankDetails: 'Payment Details',
    beneficiary: 'Beneficiary',
    bank:        'Bank',
    accountNum:  'Account Number',
    abaRouting:  'ABA Routing Number',
    swift:       'SWIFT / BIC',
    currency:    'Currency',
    qty:         'Qty',
    description: 'Description',
    totalAmount: 'Total Amount',
    totalDue:    'Total Due on',
    thanks:      'Thank you!',
    issuedOn:    'Issued on',
    valuesIn:    'Values in',
    printBtn:    '🖨 Print / Save PDF',
    closeBtn:    '✕ Close'
  }
};

function generateInvoice() {
  var invNum    = v('inv-number') || '001/26';
  var invDate   = v('inv-date');
  var currency  = v('inv-currency');
  var lang      = v('inv-lang') || 'PT';
  var L         = TRANSLATIONS[lang] || TRANSLATIONS.PT;
  var credName  = v('cred-name') || 'Creditor Name';
  var credAddr  = v('cred-address');
  var payerName = v('payer-name');
  var payerAddr = v('payer-address').replace(/\n/g,'<br>');
  var payerTax1 = v('payer-tax1');
  var payerTax2 = v('payer-tax2');
  var beneficiary = v('pay-beneficiary');
  var bank      = v('pay-bank');
  var account   = v('pay-account');
  var aba       = v('pay-aba');
  var swift     = v('pay-swift');
  var note      = v('pay-note');
  var dateFormatted = formatDate(invDate);

  // Collect items
  var rows = document.querySelectorAll('#items-list .item-row');
  var itemsHtml = '';
  var total = 0;
  rows.forEach(function(row) {
    var qty  = row.querySelector('.item-qty').value.trim();
    var desc = row.querySelector('.item-desc').value.trim();
    var val  = row.querySelector('.item-val').value.trim().replace(/,/g,'');
    var num  = parseFloat(val) || 0;
    total += num;
    var valStr = num.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
    itemsHtml += '<tr>'
      + '<td style="padding:16px 12px;vertical-align:top;color:#444;font-size:13px;">' + (qty||'01') + '</td>'
      + '<td style="padding:16px 12px;vertical-align:top;color:#222;font-size:13px;line-height:1.5;">' + desc + '</td>'
      + '<td style="padding:16px 12px;vertical-align:top;text-align:right;color:#222;font-size:13px;font-weight:500;">$ ' + valStr + '</td>'
      + '</tr>';
  });
  var totalStr = total.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});

  // Payment details rows
  function payRow(label, val) {
    if (!val) return '';
    return '<tr>'
      + '<td style="padding:4px 0;color:#aaa;font-size:12px;width:160px;vertical-align:top;">' + label + '</td>'
      + '<td style="padding:4px 0;color:#333;font-size:12px;font-weight:500;">' + val + '</td>'
      + '</tr>';
  }

  var html = '<!DOCTYPE html><html lang="en"><head>'
    + '<meta charset="UTF-8"/>'
    + '<title>Invoice ' + invNum + '</title>'
    + '<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>'
    + '<style>'
    + '*{margin:0;padding:0;box-sizing:border-box}'
    + 'body{font-family:"Montserrat",Arial,sans-serif;background:#e8eaed;color:#333}'
    + '.paper{max-width:720px;margin:72px auto 48px;background:#fff;padding:60px 56px 72px;position:relative;box-shadow:0 4px 24px rgba(0,0,0,0.10)}'
    + '@media print{'
    + '  body{background:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}'
    + '  .paper{margin:0!important;box-shadow:none!important;padding:40px 48px 60px!important}'
    + '  .no-print{display:none!important}'
    + '  @page{margin:0;size:A4}'
    + '}'
    + '</style>'
    + '</head><body>'

    // Print / close buttons
    + '<div class="no-print" style="position:fixed;top:16px;left:16px;display:flex;gap:8px;z-index:999">'
    + '<button onclick="window.print()" style="padding:8px 18px;background:#3b8bff;color:#fff;border:none;border-radius:7px;font-family:Montserrat,sans-serif;font-size:12px;font-weight:700;cursor:pointer;">' + L.printBtn + '</button>'
    + '<button onclick="window.close()" style="padding:8px 14px;background:#eee;color:#555;border:none;border-radius:7px;font-family:Montserrat,sans-serif;font-size:12px;font-weight:600;cursor:pointer;">' + L.closeBtn + '</button>'
    + '</div>'

    // Page wrapper (paper card)
    + '<div class="paper">'

    // WATERMARK — bottom right corner
    + '<div style="position:absolute;bottom:56px;right:40px;transform:rotate(-12deg);transform-origin:bottom right;font-family:Montserrat,sans-serif;font-size:52px;font-weight:300;font-style:italic;color:rgba(0,0,0,0.05);white-space:nowrap;letter-spacing:-1px;user-select:none;pointer-events:none;">'
    + 'Invoice ' + invNum
    + '</div>'

    // HEADER — Creditor name
    + '<div style="margin-bottom:28px;">'
    + '<div style="font-family:Montserrat,sans-serif;font-size:38px;font-weight:800;color:#3b8bff;letter-spacing:-1px;line-height:1;">' + credName + '</div>'
    + (credAddr ? '<div style="font-size:12px;color:#888;margin-top:8px;font-weight:400;">' + credAddr + '</div>' : '')
    + '</div>'

    // DIVIDER
    + '<hr style="border:none;border-top:1.5px solid #e8e8e8;margin-bottom:24px;"/>'

    // THREE COLUMNS: Date | Payer | Creditor
    + '<div style="display:grid;grid-template-columns:140px 1fr 180px;gap:24px;margin-bottom:28px;">'

    // Date col
    + '<div>'
    + '<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#3b8bff;margin-bottom:6px;">' + L.date + '</div>'
    + '<div style="font-size:13px;color:#333;">' + (dateFormatted || '') + '</div>'
    + '</div>'

    // Payer col
    + '<div>'
    + '<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#3b8bff;margin-bottom:6px;">' + L.payer + '</div>'
    + '<div style="font-size:13px;color:#333;line-height:1.7;">'
    + (payerName ? '<strong>' + payerName + '</strong><br>' : '')
    + (payerAddr ? payerAddr + '<br>' : '')
    + (payerTax1 ? payerTax1 + '<br>' : '')
    + (payerTax2 ? payerTax2 : '')
    + '</div>'
    + '</div>'

    // Creditor col
    + '<div>'
    + '<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#3b8bff;margin-bottom:6px;">' + L.creditor + '</div>'
    + '<div style="font-size:13px;color:#333;">' + credName + '</div>'
    + '</div>'

    + '</div>' // end grid

    // DIVIDER
    + '<hr style="border:none;border-top:1.5px solid #e8e8e8;margin-bottom:24px;"/>'

    // BANK DETAILS
    + '<div style="margin-bottom:28px;">'
    + '<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#3b8bff;margin-bottom:12px;">' + L.bankDetails + '</div>'
    + '<table style="border-collapse:collapse;width:auto;">'
    + payRow(L.beneficiary, beneficiary)
    + payRow(L.bank, bank)
    + payRow(L.accountNum, account)
    + payRow(L.abaRouting, aba)
    + payRow(L.swift, swift)
    + payRow(L.currency, currency)
    + '</table>'
    + (note ? '<div style="font-size:11px;font-style:italic;color:#aaa;margin-top:10px;">' + note + '</div>' : '')
    + '</div>'

    // TABELA DE ITENS
    + '<table style="width:100%;border-collapse:collapse;margin-bottom:24px;">'
    + '<thead>'
    + '<tr style="background:#3b8bff;">'
    + '<th style="padding:12px;text-align:left;color:#fff;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;width:80px;">' + L.qty + '</th>'
    + '<th style="padding:12px;text-align:left;color:#fff;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;">' + L.description + '</th>'
    + '<th style="padding:12px;text-align:right;color:#fff;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;width:140px;">' + L.totalAmount + '</th>'
    + '</tr>'
    + '</thead>'
    + '<tbody>'
    + itemsHtml
    + '</tbody>'
    + '</table>'

    // DIVIDER
    + '<hr style="border:none;border-top:1.5px solid #e8e8e8;margin-bottom:20px;"/>'

    // TOTAL
    + '<div style="display:flex;justify-content:flex-end;align-items:baseline;gap:24px;margin-bottom:40px;">'
    + '<div style="font-size:13px;color:#666;">' + L.totalDue + ' <strong style="color:#333;">' + (dateFormatted || '') + '</strong></div>'
    + '<div style="font-size:26px;font-weight:800;color:#333;">$ ' + totalStr + '</div>'
    + '</div>'

    // OBRIGADO
    + '<div style="text-align:right;margin-bottom:16px;">'
    + '<div style="font-family:Montserrat,sans-serif;font-size:32px;font-style:italic;font-weight:300;color:#3b8bff;">' + L.thanks + '</div>'
    + '<div style="font-size:11px;color:#bbb;margin-top:6px;">Invoice ' + invNum + '&nbsp;&nbsp;·&nbsp;&nbsp;' + L.issuedOn + ' ' + (dateFormatted || '') + '&nbsp;&nbsp;·&nbsp;&nbsp;' + L.valuesIn + ' ' + currency + '</div>'
    + '</div>'

    + '</div>' // page wrapper
    + '<script>window.onload=function(){window.print();}<\/script>'
    + '</body></html>';

  var blob = new Blob([html], {type:'text/html'});
  window.open(URL.createObjectURL(blob), '_blank');
}
</script>
</body>
</html>
