<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Gerador de Notícias — Soma Partners</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0b1e30;--blue:#3b8bff;--gold:#c9963c;--border:rgba(255,255,255,0.08);--muted:rgba(255,255,255,0.4);--surface:rgba(255,255,255,0.04)}
html,body{min-height:100%;background:var(--navy);font-family:'Montserrat',sans-serif;color:#fff}

/* NAV */
.topnav{background:rgba(11,30,48,0.98);border-bottom:1px solid var(--border);padding:0 28px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-left{display:flex;align-items:center;gap:12px}
.logo-a{display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit}
.logo-soma{font-size:15px;font-weight:300}.logo-pipe{width:1px;height:18px;background:rgba(255,255,255,0.3)}.logo-partners{font-size:9px;font-weight:700;letter-spacing:4px;text-transform:uppercase;opacity:.7}
.nav-sep{width:1px;height:22px;background:var(--border)}.nav-title{font-size:12px;font-weight:800;letter-spacing:.2px}
.btn-back{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:7px;font-size:11px;font-weight:700;font-family:'Montserrat',sans-serif;cursor:pointer;border:1px solid rgba(255,255,255,0.14);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.7);transition:all .18s;text-decoration:none}
.btn-back:hover{background:rgba(255,255,255,0.11);color:#fff}
.btn-back svg{width:12px;height:12px;stroke:currentColor;stroke-width:2.5;fill:none}

/* HEADER */
.page-header{padding:28px 32px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap}
.ph-title{font-size:22px;font-weight:900;letter-spacing:-.3px}
.ph-sub{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.6;max-width:460px}

/* CONTROLS */
.controls{padding:18px 32px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.cat-tabs{display:flex;gap:0;background:rgba(255,255,255,0.05);border-radius:10px;padding:3px;border:1px solid var(--border)}
.cat-tab{padding:7px 20px;border-radius:7px;font-size:11px;font-weight:700;font-family:'Montserrat',sans-serif;cursor:pointer;color:var(--muted);background:none;border:none;transition:all .15s;letter-spacing:.2px}
.cat-tab.active{background:rgba(59,139,255,0.18);color:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.2)}
.btn-buscar{display:inline-flex;align-items:center;gap:7px;padding:8px 20px;border-radius:9px;font-size:11px;font-weight:800;font-family:'Montserrat',sans-serif;cursor:pointer;background:var(--blue);border:none;color:#fff;transition:all .18s;letter-spacing:.3px}
.btn-buscar:hover{background:#2d7af0;transform:translateY(-1px)}
.btn-buscar:disabled{opacity:.5;cursor:default;transform:none}
.btn-buscar svg{width:13px;height:13px;stroke:currentColor;stroke-width:2.5;fill:none}
.last-updated{font-size:10px;color:var(--muted);margin-left:auto}

/* GRID */
.news-grid{padding:20px 32px 48px;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}

/* CARD */
.news-card{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .18s}
.news-card:hover{border-color:rgba(255,255,255,0.14)}
.nc-header{padding:12px 14px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.05)}
.nc-source{font-size:9px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--blue);background:rgba(59,139,255,0.1);border:1px solid rgba(59,139,255,0.2);padding:3px 8px;border-radius:5px}
.nc-date{font-size:9px;color:var(--muted);font-weight:600}
.nc-original{padding:10px 14px 8px;font-size:11px;color:rgba(255,255,255,0.45);line-height:1.5;font-style:italic;border-bottom:1px solid rgba(255,255,255,0.05)}
.nc-section{padding:12px 14px 10px;border-bottom:1px solid rgba(255,255,255,0.05)}
.nc-section-label{font-size:8.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;display:flex;align-items:center;gap:5px}
.nc-content{font-size:13px;font-weight:700;color:#fff;line-height:1.5;margin-bottom:8px}
.nc-desc{font-size:11px;font-weight:500;color:rgba(255,255,255,0.8);line-height:1.65}
.nc-copy{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:6px;font-size:10px;font-weight:700;font-family:'Montserrat',sans-serif;cursor:pointer;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.55);transition:all .15s}
.nc-copy:hover{background:rgba(255,255,255,0.09);color:#fff;border-color:rgba(255,255,255,0.2)}
.nc-copy svg{width:11px;height:11px;stroke:currentColor;stroke-width:2;fill:none;flex-shrink:0}
.nc-footer{padding:10px 14px}
.nc-link{font-size:10px;font-weight:700;color:var(--muted);text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:color .15s}
.nc-link:hover{color:var(--blue)}

/* ACCENTS por seção */
.nc-section.titulo-sec{background:rgba(59,139,255,0.04);border-left:2px solid rgba(59,139,255,0.35)}
.nc-section.assunto-sec{background:rgba(201,150,60,0.04);border-left:2px solid rgba(201,150,60,0.35)}

/* LOADING */
.loader{display:none;flex-direction:column;align-items:center;justify-content:center;padding:80px;grid-column:1/-1;gap:14px;color:var(--muted)}
.loader.show{display:flex}
.spin{width:32px;height:32px;border:3px solid rgba(59,139,255,0.2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* EMPTY */
.empty{display:none;flex-direction:column;align-items:center;padding:80px;grid-column:1/-1;text-align:center;color:var(--muted);gap:10px}
.empty.show{display:flex}
.empty-icon{font-size:42px;opacity:.5;margin-bottom:4px}
.empty-title{font-size:13px;font-weight:700;color:rgba(255,255,255,0.5)}
.empty-sub{font-size:11px;line-height:1.6;max-width:320px}

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(12px);background:#1a3348;border:1px solid rgba(59,139,255,0.4);border-radius:10px;padding:9px 20px;font-size:11px;font-weight:700;color:#93c5fd;opacity:0;transition:all .25s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:700px){
  .controls{padding:14px 16px 12px}
  .news-grid{padding:14px 16px 32px}
  .page-header{padding:20px 16px 0}
  .cat-tab{padding:6px 14px;font-size:10px}
  .last-updated{display:none}
}
</style>
</head>
<body>

<nav class="topnav">
  <div class="nav-left">
    <a class="logo-a" href="../soma-partners.html">
      <span class="logo-soma">Soma</span><span class="logo-pipe"></span><span class="logo-partners">Partners</span>
    </a>
    <div class="nav-sep"></div>
    <span class="nav-title">Gerador de Notícias</span>
  </div>
  <a class="btn-back" href="../ferramentas.html">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Ferramentas
  </a>
</nav>

<div class="page-header">
  <div>
    <div class="ph-title">📰 Gerador de Notícias</div>
    <div class="ph-sub">Busca as últimas notícias mundiais e gera automaticamente títulos e legendas prontos para post.</div>
  </div>
</div>

<div class="controls">
  <div class="cat-tabs">
    <button class="cat-tab active" id="tab-eco" onclick="setCategoria('economia')">🌐 Política / Economia</button>
    <button class="cat-tab" id="tab-esp" onclick="setCategoria('esporte')">⚽ Esporte</button>
  </div>
  <button class="btn-buscar" id="btn-buscar" onclick="buscarNoticias()">
    <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.6"/></svg>
    Buscar Notícias
  </button>
  <span class="last-updated" id="last-updated"></span>
</div>

<div class="news-grid" id="news-grid">
  <div class="empty show" id="empty-state">
    <div class="empty-icon">📰</div>
    <div class="empty-title">Nenhuma notícia carregada</div>
    <div class="empty-sub">Selecione uma categoria e clique em "Buscar Notícias" para começar.</div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
if(sessionStorage.getItem('soma_auth')!=='1'){window.location.href='../login.html';}

/* ── CONFIG ──────────────────────────── */
const FEEDS = {
  economia:[
    {url:'https://g1.globo.com/dynamo/economia/rss2.xml',       label:'G1 Economia',    emoji:'📊'},
    {url:'https://g1.globo.com/dynamo/politica/rss2.xml',       label:'G1 Política',    emoji:'🏛️'},
    {url:'https://feeds.bbci.co.uk/news/business/rss.xml',      label:'BBC Business',   emoji:'💰'},
    {url:'https://feeds.bbci.co.uk/news/world/rss.xml',         label:'BBC World',      emoji:'🌐'},
  ],
  esporte:[
    {url:'https://ge.globo.com/dynamo/rss2.xml',                label:'GE Globo',       emoji:'⚽'},
    {url:'https://feeds.bbci.co.uk/sport/rss.xml',              label:'BBC Sport',      emoji:'🏆'},
    {url:'https://ge.globo.com/futebol/times/flamengo/dynamo/rss2.xml', label:'Flamengo', emoji:'🔴'},
  ]
};

const RSS2JSON = 'https://api.rss2json.com/v1/api.json?count=6&rss_url=';

let _cat = 'economia';
let _buscando = false;

/* ── CATEGORIA ───────────────────────── */
function setCategoria(cat){
  _cat = cat;
  document.getElementById('tab-eco').classList.toggle('active', cat==='economia');
  document.getElementById('tab-esp').classList.toggle('active', cat==='esporte');
}

/* ── FETCH ───────────────────────────── */
async function buscarNoticias(){
  if(_buscando) return;
  _buscando = true;
  const btn = document.getElementById('btn-buscar');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin" style="width:12px;height:12px;border-width:2px;margin-right:6px"></div>Buscando...';

  const grid = document.getElementById('news-grid');
  document.getElementById('empty-state').classList.remove('show');
  grid.innerHTML = `<div class="loader show"><div class="spin"></div><div style="font-size:11px">Carregando notícias...</div></div>`;

  const feeds = FEEDS[_cat];
  const resultados = await Promise.all(feeds.map(feed => fetchFeed(feed)));
  let itens = resultados.flat()
    .filter(i => i.title && i.link)
    .sort((a,b) => new Date(b.pubDate||0) - new Date(a.pubDate||0));

  // deduplicar por similaridade de título
  const vistos = new Set();
  itens = itens.filter(i => {
    const chave = i.title.toLowerCase().substring(0,40);
    if(vistos.has(chave)) return false;
    vistos.add(chave); return true;
  }).slice(0, 12);

  _buscando = false;
  btn.disabled = false;
  btn.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.6"/></svg>Buscar Notícias';

  const now = new Date();
  document.getElementById('last-updated').textContent =
    `Atualizado às ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  renderNoticias(itens);
}

async function fetchFeed(feed){
  try{
    const r = await fetch(RSS2JSON + encodeURIComponent(feed.url));
    const d = await r.json();
    if(d.status !== 'ok') return [];
    return (d.items||[]).map(item=>({...item, feedLabel:feed.label, feedEmoji:feed.emoji}));
  }catch(e){
    console.warn('Erro no feed:', feed.url);
    return [];
  }
}

/* ── GERAÇÃO DE POST ─────────────────── */
function limpar(str){
  return (str||'')
    .replace(/<[^>]*>/g,'')
    .replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').replace(/&lt;/g,'<')
    .replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#\d+;/g,'')
    .replace(/\s+/g,' ').trim();
}

function gerarTitulo(item){
  let t = (item.title||'')
    .replace(/ [-|–] BBC (News|Sport|Business|World|Brasil).*$/i,'')
    .replace(/ [-|–|:] Reuters.*$/i,'')
    .replace(/ [-|–] G1.*$/i,'')
    .replace(/ [-|–] ge\.globo.*$/i,'')
    .replace(/ [-|–] Globo.*$/i,'')
    .replace(/ [-|–] UOL.*$/i,'')
    .trim();
  return `${item.feedEmoji} ${t}`;
}

function gerarAssunto(item){
  const raw = limpar(item.description || item.content || '');
  if(!raw) return 'Acesse a notícia completa pelo link abaixo.';
  const texto = raw.substring(0, 320);
  // cortar na última frase completa
  const idx = Math.max(texto.lastIndexOf('. '), texto.lastIndexOf('! '), texto.lastIndexOf('? '));
  const resumo = (idx > 80) ? texto.substring(0, idx+1) : texto.substring(0, 260).trimEnd() + '...';
  return resumo;
}

function fmtData(ds){
  if(!ds) return '';
  try{
    return new Date(ds).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  }catch{return '';}
}

/* ── RENDER ──────────────────────────── */
function renderNoticias(itens){
  const grid = document.getElementById('news-grid');
  if(!itens.length){
    grid.innerHTML = `<div class="empty show">
      <div class="empty-icon">😕</div>
      <div class="empty-title">Sem notícias disponíveis</div>
      <div class="empty-sub">Os feeds podem estar temporariamente indisponíveis. Tente novamente em instantes.</div>
    </div>`;
    return;
  }

  grid.innerHTML = itens.map((item, idx) => {
    const titulo  = gerarTitulo(item);
    const assunto = gerarAssunto(item);
    const data    = fmtData(item.pubDate);
    const id      = `n${idx}`;
    return `<div class="news-card">
      <div class="nc-header">
        <span class="nc-source">${item.feedEmoji} ${item.feedLabel}</span>
        <span class="nc-date">${data}</span>
      </div>
      <div class="nc-original" title="Título original">${limpar(item.title)}</div>

      <div class="nc-section titulo-sec">
        <div class="nc-section-label">📣 Título do Post</div>
        <div class="nc-content" id="${id}-titulo">${titulo}</div>
        <button class="nc-copy" onclick="copiar(this,'${id}-titulo')">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copiar título
        </button>
      </div>

      <div class="nc-section assunto-sec">
        <div class="nc-section-label">📝 Assunto / Legenda</div>
        <div class="nc-content nc-desc" id="${id}-assunto">${assunto}</div>
        <button class="nc-copy" onclick="copiar(this,'${id}-assunto')">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copiar assunto
        </button>
      </div>

      <div class="nc-footer">
        <a href="${item.link}" target="_blank" class="nc-link">
          <svg style="width:11px;height:11px;stroke:currentColor;stroke-width:2;fill:none" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Ver notícia original
        </a>
      </div>
    </div>`;
  }).join('');
}

/* ── COPIAR ──────────────────────────── */
function copiar(btn, elementId){
  const texto = document.getElementById(elementId)?.textContent?.trim() || '';
  if(!texto) return;
  navigator.clipboard.writeText(texto).then(()=>{
    const orig = btn.innerHTML;
    btn.innerHTML = '✓ Copiado!';
    btn.style.color = '#6ee7b7';
    btn.style.borderColor = 'rgba(16,185,129,0.4)';
    btn.style.background = 'rgba(16,185,129,0.08)';
    setTimeout(()=>{
      btn.innerHTML = orig;
      btn.style.color = '';
      btn.style.borderColor = '';
      btn.style.background = '';
    }, 2000);
    showToast('Copiado para a área de transferência ✓');
  }).catch(()=>alert('Não foi possível copiar. Use Ctrl+C.'));
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}
</script>
</body>
</html>
