<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Criador de Newsletter — Soma Partners</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0b1e30;--gold:#c9963c;--blue:#3b8bff;--border:rgba(255,255,255,0.09);--muted:rgba(255,255,255,0.45);--surface:rgba(255,255,255,0.04)}
html,body{height:100%;background:var(--navy);font-family:'Montserrat',sans-serif;color:#fff;overflow:hidden}

/* NAV */
.topnav{background:rgba(11,30,48,0.98);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.nav-left{display:flex;align-items:center;gap:12px}
.logo-soma{font-size:15px;font-weight:300;letter-spacing:.5px}
.logo-pipe{width:1px;height:18px;background:rgba(255,255,255,0.3)}
.logo-partners{font-size:9px;font-weight:700;letter-spacing:4px;text-transform:uppercase;opacity:.75}
.nav-sep{width:1px;height:22px;background:rgba(255,255,255,0.1)}
.nav-title{font-size:12px;font-weight:800}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:7px;font-size:11px;font-weight:700;font-family:'Montserrat',sans-serif;cursor:pointer;border:none;transition:all .18s}
.btn svg{width:11px;height:11px;stroke:currentColor;stroke-width:2.5;fill:none}
.btn-ghost{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.7)}.btn-ghost:hover{color:#fff;background:rgba(255,255,255,0.1)}
.btn-gold{background:rgba(201,150,60,0.18);border:1px solid rgba(201,150,60,0.4);color:#c9963c}.btn-gold:hover{background:rgba(201,150,60,0.3);color:#fff}
.btn-blue{background:var(--blue);color:#fff;border:none}.btn-blue:hover{filter:brightness(1.1)}

/* LAYOUT */
.layout{display:grid;grid-template-columns:340px 1fr;height:calc(100vh - 52px);overflow:hidden}

/* PAINEL */
.panel{border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.panel-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.ptab{flex:1;padding:10px 8px;font-size:10px;font-weight:700;text-align:center;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s}
.ptab.active{color:#fff;border-bottom-color:var(--blue)}
.ptab-content{display:none;padding:16px;flex:1}.ptab-content.active{display:block}

.field{margin-bottom:11px}
.field label{display:block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:7px 10px;font-size:11px;font-family:'Montserrat',sans-serif;color:#fff;outline:none;transition:border-color .15s;color-scheme:dark}
.field input:focus,.field textarea:focus,.field select:focus{border-color:rgba(59,139,255,0.5)}
.field textarea{resize:vertical;min-height:80px;line-height:1.55}

.section-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}

/* BLOCOS */
.blocks-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.block-item{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.block-header{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;cursor:pointer}
.block-header:hover{background:rgba(255,255,255,0.03)}
.block-info{display:flex;align-items:center;gap:8px}
.block-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.block-name{font-size:11px;font-weight:700;color:rgba(255,255,255,0.85)}
.block-actions{display:flex;gap:4px;align-items:center}
.block-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.25);font-size:13px;padding:2px 5px;border-radius:4px;transition:color .15s;line-height:1}
.block-btn:hover{color:#fff}
.block-btn.del:hover{color:#ef4444}
.block-edit{padding:10px 12px;border-top:1px solid var(--border);display:none}
.block-item.expanded .block-edit{display:block}
.block-item.expanded .block-header{background:rgba(255,255,255,0.04)}

.add-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.add-btn{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:7px;padding:9px 8px;text-align:center;cursor:pointer;transition:all .15s}
.add-btn:hover{background:rgba(59,139,255,0.1);border-color:rgba(59,139,255,0.3)}
.add-btn .icon{font-size:15px;display:block;margin-bottom:3px}
.add-btn span{font-size:9px;font-weight:700;color:rgba(255,255,255,0.6)}

/* PREVIEW */
.preview-area{overflow-y:auto;background:#d0ccc5;display:flex;flex-direction:column;align-items:center;padding:20px}
.preview-toolbar{width:100%;max-width:620px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.preview-label{font-size:10px;font-weight:700;color:#475569}
.preview-shell{background:#f2efe9;width:100%;max-width:600px;box-shadow:0 4px 32px rgba(0,0,0,0.2);border-radius:3px;overflow:hidden}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-ov.open{opacity:1;pointer-events:all}
.modal-box{background:#0f1e2e;border:1px solid rgba(201,150,60,0.2);border-radius:12px;padding:22px;width:90%;max-width:680px;max-height:88vh;overflow-y:auto}
.modal-title{font-size:13px;font-weight:800;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.code-block{background:#060e16;border:1px solid var(--border);border-radius:7px;padding:14px;font-family:monospace;font-size:11px;color:#7dd3fc;line-height:1.6;white-space:pre-wrap;word-break:break-all;max-height:420px;overflow-y:auto;user-select:all;cursor:text}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
</style>
</head>
<body>

<nav class="topnav">
  <div class="nav-left">
    <span class="logo-soma">Soma</span><span class="logo-pipe"></span><span class="logo-partners">Partners</span>
    <div class="nav-sep"></div>
    <span class="nav-title">Criador de Newsletter</span>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-ghost" onclick="window.location.href='../ferramentas.html'">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Ferramentas
    </button>
    <button class="btn btn-gold" onclick="abrirModal()">
      <svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>Exportar HTML
    </button>
  </div>
</nav>

<div class="layout">
  <!-- PAINEL ESQUERDO -->
  <div class="panel">
    <div class="panel-tabs">
      <div class="ptab active" onclick="switchPTab('configuracoes',this)">Configurações</div>
      <div class="ptab" onclick="switchPTab('blocos',this)">Blocos</div>
    </div>

    <!-- ABA CONFIGURAÇÕES -->
    <div class="ptab-content active" id="ptab-configuracoes">
      <div class="section-label">Cabeçalho</div>
      <div class="field"><label>Título da Edição</label><input id="cfg-titulo" value="Panorama Semanal de Mercado" oninput="preview()"/></div>
      <div class="field"><label>Número da Edição</label><input id="cfg-edicao" value="01" oninput="preview()"/></div>
      <div class="field"><label>Data</label><input id="cfg-data" value="Segunda-feira · 16 de junho de 2026" oninput="preview()"/></div>
      <div class="field"><label>URL do Logo (deixe em branco para texto)</label><input id="cfg-logo" value="https://www.somapartners.com.br/logo-soma-partners.png" oninput="preview()"/></div>
      <br>
      <div class="section-label">Rodapé</div>
      <div class="field"><label>Texto Legal</label><textarea id="cfg-legal" oninput="preview()">Você recebe este conteúdo por interesse nos serviços da Soma Partners.
As informações têm finalidade exclusivamente informativa e não constituem recomendação de investimento.</textarea></div>
      <div class="field"><label>Link Cancelar Inscrição (#)</label><input id="cfg-unsub" value="#" oninput="preview()"/></div>
    </div>

    <!-- ABA BLOCOS -->
    <div class="ptab-content" id="ptab-blocos">
      <div class="section-label">Blocos Ativos</div>
      <div class="blocks-list" id="blocks-list"></div>

      <div class="section-label" style="margin-top:4px">Adicionar Bloco</div>
      <div class="add-grid">
        <div class="add-btn" onclick="addBlock('panorama')"><span class="icon">📰</span><span>Panorama</span></div>
        <div class="add-btn" onclick="addBlock('numero')"><span class="icon">🔢</span><span>Número da Semana</span></div>
        <div class="add-btn" onclick="addBlock('radar')"><span class="icon">📡</span><span>No Radar</span></div>
        <div class="add-btn" onclick="addBlock('quote')"><span class="icon">💬</span><span>Quote</span></div>
        <div class="add-btn" onclick="addBlock('cta_dark')"><span class="icon">🚀</span><span>CTA Dark</span></div>
        <div class="add-btn" onclick="addBlock('texto')"><span class="icon">📝</span><span>Texto Livre</span></div>
      </div>
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="preview-area">
    <div class="preview-toolbar">
      <span class="preview-label">Preview — 600px</span>
      <button class="btn btn-ghost" style="font-size:10px" onclick="abrirModal()">📋 Copiar HTML</button>
    </div>
    <div class="preview-shell" id="preview-shell"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-ov" id="modal-html">
  <div class="modal-box">
    <div class="modal-title">
      <span>HTML Exportado</span>
      <button class="btn btn-ghost" style="padding:4px 10px" onclick="fecharModal()">✕</button>
    </div>
    <div class="code-block" id="modal-code"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="fecharModal()">Fechar</button>
      <button class="btn btn-blue" onclick="copiarHTML()">📋 Copiar Tudo</button>
    </div>
  </div>
</div>

<script>
if(sessionStorage.getItem('soma_auth')!=='1'||sessionStorage.getItem('soma_admin')!=='1') window.location.href='../login.html';

// ── ESTADO ──
let blocks = [
  {id:uid(), type:'panorama',
    eyebrow:'Panorama da Semana',
    titulo:'O que vai mexer com o mercado nos próximos 5 dias',
    corpo:`A semana começa com o mercado digerindo a ata do Copom divulgada na quinta passada, que reforçou um tom mais duro do Banco Central. O consenso do Focus já embute Selic em <strong>13,75% no final de 2026</strong> — e os dados de inflação que saem essa semana vão ditar o ritmo.\n\nLá fora, o Federal Reserve manteve os juros inalterados na reunião de junho, mas o chairman Powell sinalizou que não há pressa para cortes.\n\n<strong>Quem tem carteira bem estruturada não precisa temer a volatilidade: pode aproveitá-la.</strong>`,
    cta_texto:'Acessar carteira recomendada ›',
    cta_url:'SEU_LINK_AQUI'},
  {id:uid(), type:'numero',
    valor:'7,3%',
    descricao:'É a taxa real de juro (acima da inflação) embutida nos títulos NTN-B com vencimento em 2035 — o maior nível em 4 anos.',
    fonte:'Fonte: Tesouro Direto · Jun/2026'},
  {id:uid(), type:'radar',
    eyebrow:'No Radar',
    titulo:'O que acompanhar essa semana',
    items:[
      {titulo:'Quarta · IPCA-15',texto:'Prévia da inflação de junho. Consenso em +0,38%. Qualquer surpresa para cima reforça o discurso hawkish do Copom.'},
      {titulo:'Quinta · Resultado Fiscal',texto:'Governo divulga o resultado primário de maio. O mercado quer ver se o déficit está sob controle.'},
      {titulo:'Semana toda · Dólar & Petróleo',texto:'Acordo EUA-Irã segura o petróleo abaixo de US$ 70. Quem tem exposição em FIIs pode se beneficiar do câmbio.'}
    ]},
  {id:uid(), type:'quote',
    texto:'Volatilidade não é risco para quem está bem posicionado. É oportunidade para quem não está.',
    autor:'Soma Partners'},
  {id:uid(), type:'cta_dark',
    eyebrow:'Soma Invest',
    titulo:'Sua carteira está preparada para o segundo semestre?',
    corpo:'Estruturamos portfólios personalizados com visão de longo prazo — combinando renda fixa, ativos alternativos e proteção patrimonial alinhados ao seu perfil.',
    cta_texto:'Conhecer o Soma Invest ›',
    cta_url:'https://www.somapartners.com.br/site/services/soma-invest'}
];

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

// ── SWITCH TABS ──
function switchPTab(id, el){
  document.querySelectorAll('.ptab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
  document.getElementById('ptab-'+id).classList.add('active');
  el.classList.add('active');
}

// ── BLOCK COLORS ──
const BLOCK_META = {
  panorama:  {label:'Panorama', color:'#3b8bff'},
  numero:    {label:'Número da Semana', color:'#c9a44a'},
  radar:     {label:'No Radar', color:'#10b981'},
  quote:     {label:'Quote', color:'#8b5cf6'},
  cta_dark:  {label:'CTA Dark', color:'#ef4444'},
  texto:     {label:'Texto Livre', color:'#64748b'},
};

// ── RENDER BLOCKS LIST ──
function renderBlocksList(){
  const list = document.getElementById('blocks-list');
  list.innerHTML = blocks.map((b,i) => {
    const meta = BLOCK_META[b.type]||{label:b.type,color:'#64748b'};
    return `<div class="block-item" id="bi-${b.id}">
      <div class="block-header" onclick="toggleBlock('${b.id}')">
        <div class="block-info">
          <div class="block-dot" style="background:${meta.color}"></div>
          <div>
            <div class="block-name">${meta.label}</div>
          </div>
        </div>
        <div class="block-actions">
          ${i>0?`<button class="block-btn" onclick="event.stopPropagation();moveBlock('${b.id}',-1)" title="Subir">↑</button>`:''}
          ${i<blocks.length-1?`<button class="block-btn" onclick="event.stopPropagation();moveBlock('${b.id}',1)" title="Descer">↓</button>`:''}
          <button class="block-btn del" onclick="event.stopPropagation();removeBlock('${b.id}')" title="Remover">×</button>
        </div>
      </div>
      <div class="block-edit">${blockEditHTML(b)}</div>
    </div>`;
  }).join('');
}

function blockEditHTML(b){
  const f=(id,label,val,type='input',rows=3)=>type==='textarea'
    ?`<div class="field"><label>${label}</label><textarea rows="${rows}" oninput="updateBlock('${b.id}','${id}',this.value)">${escHtml(val||'')}</textarea></div>`
    :`<div class="field"><label>${label}</label><input value="${escAttr(val||'')}" oninput="updateBlock('${b.id}','${id}',this.value)"/></div>`;

  if(b.type==='panorama') return `
    ${f('eyebrow','Eyebrow',b.eyebrow)}
    ${f('titulo','Título',b.titulo)}
    ${f('corpo','Corpo (HTML permitido)',b.corpo,'textarea',6)}
    ${f('cta_texto','Texto do Botão',b.cta_texto)}
    ${f('cta_url','URL do Botão',b.cta_url)}`;

  if(b.type==='numero') return `
    ${f('valor','Número / Valor',b.valor)}
    ${f('descricao','Descrição',b.descricao,'textarea',3)}
    ${f('fonte','Fonte',b.fonte)}`;

  if(b.type==='radar'){
    const itemsHTML = (b.items||[]).map((item,idx)=>`
      <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:9px 10px;margin-bottom:7px">
        <div class="field" style="margin-bottom:7px"><label>Título</label><input value="${escAttr(item.titulo||'')}" oninput="updateRadarItem('${b.id}',${idx},'titulo',this.value)"/></div>
        <div class="field" style="margin-bottom:0"><label>Texto</label><textarea rows="2" oninput="updateRadarItem('${b.id}',${idx},'texto',this.value)">${escHtml(item.texto||'')}</textarea></div>
      </div>`).join('');
    return `
      ${f('eyebrow','Eyebrow',b.eyebrow)}
      ${f('titulo','Título da Seção',b.titulo)}
      <div class="field"><label>Itens do Radar</label></div>
      ${itemsHTML}
      <button class="btn btn-ghost" style="font-size:10px;padding:5px 12px;width:100%;justify-content:center" onclick="addRadarItem('${b.id}')">+ Adicionar item</button>`;
  }

  if(b.type==='quote') return `
    ${f('texto','Texto da Quote',b.texto,'textarea',3)}
    ${f('autor','Autor',b.autor)}`;

  if(b.type==='cta_dark') return `
    ${f('eyebrow','Eyebrow',b.eyebrow)}
    ${f('titulo','Título',b.titulo)}
    ${f('corpo','Parágrafo',b.corpo,'textarea',3)}
    ${f('cta_texto','Texto do Botão',b.cta_texto)}
    ${f('cta_url','URL do Botão',b.cta_url)}`;

  if(b.type==='texto') return `
    ${f('titulo','Título (opcional)',b.titulo||'')}
    ${f('corpo','Conteúdo (HTML permitido)',b.corpo||'','textarea',5)}`;

  return '';
}

function toggleBlock(id){
  document.getElementById('bi-'+id)?.classList.toggle('expanded');
}

function updateBlock(id, field, val){
  const b = blocks.find(x=>x.id===id);
  if(b) b[field]=val;
  preview();
}

function updateRadarItem(blockId, idx, field, val){
  const b = blocks.find(x=>x.id===blockId);
  if(b&&b.items&&b.items[idx]) b.items[idx][field]=val;
  preview();
}

function addRadarItem(blockId){
  const b = blocks.find(x=>x.id===blockId);
  if(b){b.items=b.items||[];b.items.push({titulo:'Novo Item',texto:'Descrição aqui.'});}
  renderBlocksList();preview();
}

function moveBlock(id, dir){
  const i = blocks.findIndex(x=>x.id===id);
  const j = i+dir;
  if(j<0||j>=blocks.length) return;
  [blocks[i],blocks[j]]=[blocks[j],blocks[i]];
  renderBlocksList();preview();
}

function removeBlock(id){
  blocks=blocks.filter(b=>b.id!==id);
  renderBlocksList();preview();
}

function addBlock(type){
  const defaults = {
    panorama:{eyebrow:'Seção',titulo:'Título aqui',corpo:'Texto do parágrafo.',cta_texto:'Saiba mais ›',cta_url:'#'},
    numero:{valor:'0%',descricao:'Explicação do número.',fonte:'Fonte:'},
    radar:{eyebrow:'No Radar',titulo:'O que acompanhar',items:[{titulo:'Item 1',texto:'Descrição.'}]},
    quote:{texto:'Frase de impacto aqui.',autor:'Soma Partners'},
    cta_dark:{eyebrow:'Soma Partners',titulo:'Chamada para ação aqui.',corpo:'Texto de apoio.',cta_texto:'Clique aqui ›',cta_url:'#'},
    texto:{titulo:'',corpo:'Texto livre aqui.'}
  };
  blocks.push({id:uid(),type,...(defaults[type]||{})});
  renderBlocksList();preview();
  // auto-expand novo bloco
  setTimeout(()=>document.getElementById('bi-'+blocks[blocks.length-1].id)?.classList.add('expanded'),50);
  switchPTab('blocos',document.querySelectorAll('.ptab')[1]);
}

// ── ESCAPE ──
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escAttr(s){return s.replace(/"/g,'&quot;')}

// ── GERAR HTML OUTPUT ──
function buildHTML(){
  const titulo = document.getElementById('cfg-titulo').value||'Panorama Semanal';
  const edicao = document.getElementById('cfg-edicao').value||'01';
  const data   = document.getElementById('cfg-data').value||'';
  const logo   = document.getElementById('cfg-logo').value||'';
  const legal  = (document.getElementById('cfg-legal').value||'').replace(/\n/g,'<br />');
  const unsub  = document.getElementById('cfg-unsub').value||'#';

  function bloco(b){
    if(b.type==='panorama') return `
  <!-- PANORAMA -->
  <div class="section">
    <div class="eyebrow">${b.eyebrow||''}</div>
    <h2>${b.titulo||''}</h2>
    ${(b.corpo||'').split('\n\n').map(p=>`<p>${p}</p>`).join('\n    ')}
    <hr class="sep" />
    <div class="cta-wrap">
      <a class="cta-btn" href="${b.cta_url||'#'}">${b.cta_texto||'Saiba mais'}</a>
    </div>
  </div>`;

    if(b.type==='numero') return `
  <!-- NÚMERO DA SEMANA -->
  <div class="numero-box">
    <div class="numero-label">Número da Semana</div>
    <div class="numero-value">${b.valor||''}</div>
    <div class="numero-desc">${b.descricao||''}</div>
    <div class="numero-fonte">${b.fonte||''}</div>
  </div>`;

    if(b.type==='radar'){
      const items=(b.items||[]).map(item=>`
    <div class="radar-item">
      <p><strong>${item.titulo||''}:</strong> ${item.texto||''}</p>
    </div>`).join('');
      return `
  <!-- NO RADAR -->
  <div class="radar-box">
    <div class="eyebrow">${b.eyebrow||''}</div>
    <h2>${b.titulo||''}</h2>${items}
  </div>`;
    }

    if(b.type==='quote') return `
  <!-- QUOTE -->
  <div class="quote-box">
    <span class="quote-mark">"</span>
    <div class="quote-text">${b.texto||''}</div>
    <div class="quote-author">— ${b.autor||''}</div>
  </div>`;

    if(b.type==='cta_dark') return `
  <!-- CTA DARK -->
  <div class="cta-dark">
    <div class="eyebrow">${b.eyebrow||''}</div>
    <h2>${b.titulo||''}</h2>
