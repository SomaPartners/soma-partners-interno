<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Antecipação de Saldos — Soma Partners</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0b1e30;--blue:#3b8bff;--gold:#c9963c;--green:#10b981;--red:#ef4444;--border:rgba(255,255,255,0.08);--muted:rgba(255,255,255,0.4);--surface:rgba(255,255,255,0.04)}
html,body{min-height:100%;background:var(--navy);font-family:'Montserrat',sans-serif;color:#fff;font-size:13px}

/* NAV */
.topnav{background:rgba(11,30,48,0.98);border-bottom:1px solid var(--border);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-left{display:flex;align-items:center;gap:14px}
.logo-soma{font-size:17px;font-weight:300}.logo-pipe{width:1px;height:20px;background:rgba(255,255,255,0.3)}.logo-partners{font-size:10px;font-weight:700;letter-spacing:5px;text-transform:uppercase;opacity:.7}
.nav-sep{width:1px;height:24px;background:var(--border)}.nav-title{font-size:13px;font-weight:800}
.nav-right{display:flex;align-items:center;gap:12px}
.last-updated{font-size:10px;color:var(--muted)}
.btn-refresh{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.7);font-size:11px;font-weight:700;font-family:'Montserrat',sans-serif;cursor:pointer;transition:all .18s}
.btn-refresh:hover{background:rgba(255,255,255,0.1);color:#fff}
.btn-refresh.loading{opacity:.6;pointer-events:none}
.btn-refresh svg{width:13px;height:13px;stroke:currentColor;stroke-width:2.5;fill:none}
.btn-refresh.loading svg{animation:spin .7s linear infinite}

/* BREADCRUMB / BACK */
.breadcrumb{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);cursor:pointer;padding:28px 40px 0;transition:color .15s}
.breadcrumb:hover{color:#fff}
.breadcrumb svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.5;fill:none}

/* SUMMARY header */
.summary-hd{padding:32px 40px 24px;border-bottom:1px solid var(--border)}
.summary-label{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.summary-title{font-size:26px;font-weight:900;letter-spacing:-.5px}
.summary-sub{font-size:11px;color:var(--muted);margin-top:4px}

/* CLIENT CARDS GRID */
.clients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:28px 40px}
.client-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px 24px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.client-card:hover{background:rgba(255,255,255,0.07);border-color:rgba(59,139,255,0.3);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,0.25)}
.client-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--acc,var(--blue))}
.cc-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.cc-name{font-size:14px;font-weight:800;margin-bottom:14px;line-height:1.3}
.cc-saldo{font-size:22px;font-weight:900;letter-spacing:-.5px;margin-bottom:4px;color:var(--sv,#fff)}
.cc-sub{font-size:10px;color:var(--muted)}
.cc-row{display:flex;gap:16px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.cc-stat{flex:1}
.cc-stat-v{font-size:13px;font-weight:700}
.cc-stat-l{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-top:2px}
.cc-arrow{position:absolute;bottom:20px;right:20px;opacity:.25;transition:opacity .2s}
.client-card:hover .cc-arrow{opacity:.7}

/* DETAIL ─ CLIENT HEADER */
.client-header{padding:32px 40px 24px;border-bottom:1px solid var(--border)}
.client-label{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.client-name{font-size:26px;font-weight:900;letter-spacing:-.5px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:28px 40px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px 24px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent,var(--blue))}
.kpi-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.kpi-value{font-size:24px;font-weight:800;letter-spacing:-.5px;color:var(--kv,#fff)}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:5px}

/* CHARTS */
.charts-grid{display:grid;grid-template-columns:5fr 6fr;gap:16px;padding:0 40px 24px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px 24px}
.chart-title{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:18px}

/* TABLE */
.table-section{padding:0 40px 60px}
.table-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.table-title{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.filter-row{display:flex;gap:6px;flex-wrap:wrap}
.fb{padding:4px 11px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.45);font-size:10px;font-weight:700;font-family:'Montserrat',sans-serif;cursor:pointer;transition:all .15s}
.fb:hover{color:#fff}.fb.active{border-color:rgba(59,139,255,0.45);background:rgba(59,139,255,0.1);color:#fff}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{border-bottom:1px solid rgba(255,255,255,0.1)}
thead th{padding:10px 14px;font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-align:left;white-space:nowrap}
tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);transition:background .12s}
tbody tr:hover{background:rgba(255,255,255,0.03)}
tbody td{padding:11px 14px;font-size:12px;color:rgba(255,255,255,.85)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.badge-e{background:rgba(16,185,129,0.14);color:#6ee7b7;border:1px solid rgba(16,185,129,0.2)}
.badge-s{background:rgba(239,68,68,0.1);color:#fca5a5;border:1px solid rgba(239,68,68,0.15)}
.tipo-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase;background:rgba(201,150,60,0.1);color:rgba(201,150,60,0.8);border:1px solid rgba(201,150,60,0.15)}
.ve{color:#6ee7b7;font-weight:700}.vs{color:#fca5a5;font-weight:700}
th.r,td.r{text-align:right}

/* LOADING / ERROR */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;color:var(--muted);font-size:12px;text-align:center}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.08);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
.load-msg{font-size:11px;color:var(--muted);max-width:280px;line-height:1.6}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:900px){
  .charts-grid{grid-template-columns:1fr}
  .kpi-grid,.clients-grid{grid-template-columns:1fr}
  .kpi-grid,.clients-grid,.summary-hd,.client-header,.table-section,.charts-grid{padding-left:20px;padding-right:20px}
  .topnav{padding:0 16px}.last-updated{display:none}
  .breadcrumb{padding:20px 20px 0}
}
</style>
</head>
<body>

<nav class="topnav">
  <div class="nav-left">
    <span class="logo-soma">Soma</span>
    <div class="logo-pipe"></div>
    <span class="logo-partners">Partners</span>
    <div class="nav-sep"></div>
    <span class="nav-title">Antecipação de Saldos</span>
  </div>
  <div class="nav-right">
    <span class="last-updated" id="lu"></span>
    <button class="btn-refresh" id="btn-refresh" onclick="loadAll()">
      <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Atualizar
    </button>
  </div>
</nav>

<!-- View: Summary -->
<div id="view-summary" style="display:none">
  <div class="summary-hd">
    <div class="summary-label">Antecipação de Saldos</div>
    <div class="summary-title">Todos os Clientes</div>
    <div class="summary-sub" id="summary-sub"></div>
  </div>
  <div class="clients-grid" id="clients-grid"></div>
</div>

<!-- View: Detail -->
<div id="view-detail" style="display:none">
  <div class="breadcrumb" onclick="backToSummary()">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Todos os clientes
  </div>
  <div id="detail-content"></div>
</div>

<!-- Loading -->
<div id="view-loading">
  <div class="loading">
    <div class="spinner"></div>
    <div class="load-msg" id="load-msg">Carregando clientes...</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const SHEET_ID = '2PACX-1vTzhi6lcErPeiH-CUwSxXXAS1EIW-elVoY0iHWCjoN5KrHXG6qEhdeaIZHOD5AhSP0v7gsFVEsc3hUy';
const BASE    = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}`;
const PUBHTML = `${BASE}/pubhtml`;
const CSVBASE = `${BASE}/pub?output=csv`;

let _clients  = [];   // [{name, gid, transactions, entradas, saidas, saldo}]
let _filter   = 'TODOS';
let _charts   = {};

// ── Utils ─────────────────────────────────────────────────────────────────
const BRL = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v);

function parseVal(s){
  if(!s) return 0;
  const raw=String(s).trim();
  if(raw==='-'||raw==='R$ -'||raw==='R$-') return 0;
  // Remove currency symbol, spaces, non-numeric except , . -
  const c=raw
    .replace(/R\$\s*/gi,'')   // R$
    .replace(/\s+/g,'')       // spaces
    .replace(/\.(?=\d{3})/g,'') // thousand-separator dots (1.000,00 → 1000,00)
    .replace(',','.')          // decimal comma → dot
    .replace(/[^\d.\-]/g,''); // anything else
  const n=parseFloat(c);
  return isNaN(n)?0:Math.abs(n);
}

const MESES=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const MMES={jan:'Jan',fev:'Fev',mar:'Mar',abr:'Abr',mai:'Mai',jun:'Jun',jul:'Jul',ago:'Ago',set:'Set',out:'Out',nov:'Nov',dez:'Dez'};
function getMes(d){const m=String(d).match(/-([a-záéíóú]+)\.?/i);return m?m[1].toLowerCase():'';}

// ── Tab discovery ─────────────────────────────────────────────────────────
async function discoverTabs(){
  try {
    const html = await fetch(`${PUBHTML}?_=${Date.now()}`).then(r=>r.text());
    const doc  = new DOMParser().parseFromString(html,'text/html');
    const tabs = [];
    doc.querySelectorAll('[id^="sheet-button-"]').forEach(el=>{
      const gid  = el.id.replace('sheet-button-','');
      const name = (el.querySelector('a')||el).textContent.trim();
      if(gid&&name) tabs.push({gid,name});
    });
    if(tabs.length) return tabs;
    // fallback: look for data-sheet-id attrs or hrefs
    const found=[];
    html.match(/gid=(\d+)/g)?.forEach(m=>{
      const gid=m.replace('gid=','');
      if(!found.find(t=>t.gid===gid)) found.push({gid,name:`Aba ${found.length+1}`});
    });
    if(found.length) return found;
  } catch(e) { /* ignore */ }
  // ultimate fallback
  return [{gid:'1715413438',name:'LUI MARK JENJON AC'}];
}

// ── CSV parse ─────────────────────────────────────────────────────────────
function processSheet(rows){
  let clientName='', headerIdx=-1, saldoCol=-1;

  // Scan row 0 for client name and SALDO column position
  (rows[0]||[]).forEach((c,i)=>{
    const v=String(c||'').trim();
    if(!clientName&&v) clientName=v;
    if(v.toUpperCase()==='SALDO') saldoCol=i;
  });

  // Find first DATA header row
  for(let i=0;i<rows.length;i++){
    const f=(rows[i][0]||'').trim();
    if(f.toUpperCase()==='DATA'){
      headerIdx=i;
      // Fallback: find SALDO col from header row
      if(saldoCol<0) rows[i].forEach((c,j)=>{
        if(String(c||'').trim().toUpperCase()==='SALDO') saldoCol=j;
      });
      break;
    }
    if(f&&!clientName) clientName=f;
  }
  if(headerIdx<0) return null;

  const tx=[];
  let lastPeriodSaldo=null;

  // Capture saldo from first header row itself (GOL DO RAYO pattern)
  if(saldoCol>=0){
    const v=parseVal(rows[headerIdx][saldoCol]);
    if(v) lastPeriodSaldo=v;
  }

  for(let i=headerIdx+1;i<rows.length;i++){
    const row=rows[i];
    const date=(row[0]||'').trim(); if(!date) continue;

    // Repeated header row (period separator) — capture its SALDO and skip
    if(date.toUpperCase()==='DATA'||date.toUpperCase()==='DATE'){
      if(saldoCol>=0){const v=parseVal(row[saldoCol]);if(v) lastPeriodSaldo=v;}
      continue;
    }

    const desc=(row[1]||'').trim();
    const tipo=(row[2]||'').trim();
    const dirRaw=(row[3]||'').trim().toUpperCase()
      .normalize('NFD').replace(/[̀-ͯ]/g,''); // strip accents for comparison
    const val=parseVal(row[4]);

    // Skip zero-value rows
    if(!val) continue;

    // Direction: explicit ENTRADA wins; everything else is SAÍDA
    // (handles blank, "SAIDA" without accent, lowercase, etc.)
    const direction = dirRaw.startsWith('EN') ? 'ENTRADA' : 'SAÍDA';
    tx.push({date,desc,tipo,direction,valor:val});
  }
  if(!tx.length) return null;

  const entradas=tx.filter(t=>t.direction==='ENTRADA').reduce((s,t)=>s+t.valor,0);
  const saidas  =tx.filter(t=>t.direction==='SAÍDA').reduce((s,t)=>s+t.valor,0);
  // Billing type (GOL DO RAYO): no entradas — client pays monthly; saldo = current period total
  const isBilling = entradas===0;
  const saldo = isBilling
    ? (lastPeriodSaldo!=null ? -lastPeriodSaldo : -saidas)
    : entradas - saidas;

  return {clientName,transactions:tx,entradas,saidas,saldo,isBilling,lastPeriodSaldo};
}

// ── Main load ─────────────────────────────────────────────────────────────
async function loadAll(){
  showView('loading');
  setMsg('Descobrindo abas da planilha...');
  const btn=document.getElementById('btn-refresh');
  if(btn) btn.classList.add('loading');

  try{
    const tabs=await discoverTabs();
    setMsg(`Carregando ${tabs.length} cliente(s)...`);

    const results=await Promise.allSettled(tabs.map(async tab=>{
      const url=`${CSVBASE}&gid=${tab.gid}&_=${Date.now()}`;
      const res=await fetch(url);
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const csv=await res.text();
      if(!csv||csv.length<20) return null;
      return new Promise((resolve,reject)=>{
        Papa.parse(csv,{
          skipEmptyLines:false,
          complete:r=>{
            const d=processSheet(r.data);
            if(!d) resolve(null);
            else resolve({...tab,...d,name:d.clientName||tab.name});
          },
          error:e=>reject(e)
        });
      });
    }));

    _clients=results
      .filter(r=>r.status==='fulfilled'&&r.value)
      .map(r=>r.value);

    if(!_clients.length){
      showErr('Nenhuma aba com dados encontrada. Verifique se a planilha está publicada.');
      return;
    }

    const lu=document.getElementById('lu');
    if(lu) lu.textContent='Atualizado às '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

    renderSummary();

  } catch(e){
    showErr('Erro ao carregar: '+(e.message||e));
  } finally {
    if(btn) btn.classList.remove('loading');
  }
}

// ── Summary view ──────────────────────────────────────────────────────────
function renderSummary(){
  const totalSaldo=_clients.reduce((s,c)=>s+c.saldo,0);
  document.getElementById('summary-sub').textContent=
    `${_clients.length} cliente(s) · Saldo total consolidado: ${BRL(totalSaldo)}`;

  const grid=document.getElementById('clients-grid');
  grid.innerHTML=_clients.map((c,i)=>{
    if(c.isBilling){
      // GOL DO RAYO style: billing account, client pays monthly
      const outstanding=c.lastPeriodSaldo||c.saidas;
      return `
      <div class="client-card" style="--acc:#f59e0b" onclick="openClient(${i})">
        <div class="cc-label">Faturamento Mensal</div>
        <div class="cc-name">${c.name}</div>
        <div class="cc-saldo" style="--sv:#fcd34d">${BRL(outstanding)}</div>
        <div class="cc-sub">Período atual em aberto</div>
        <div class="cc-row">
          <div class="cc-stat">
            <div class="cc-stat-v vs">−${BRL(c.saidas)}</div>
            <div class="cc-stat-l">Total Histórico</div>
          </div>
          <div class="cc-stat">
            <div class="cc-stat-v">${c.transactions.length}</div>
            <div class="cc-stat-l">Lançamentos</div>
          </div>
        </div>
        <svg class="cc-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>`;
    }
    const pos=c.saldo>=0;
    const acc=pos?'#10b981':'#ef4444';
    const sv=pos?'#6ee7b7':'#fca5a5';
    return `
    <div class="client-card" style="--acc:${acc}" onclick="openClient(${i})">
      <div class="cc-label">Antecipação de Saldo</div>
      <div class="cc-name">${c.name}</div>
      <div class="cc-saldo" style="--sv:${sv}">${BRL(c.saldo)}</div>
      <div class="cc-sub">Saldo atual</div>
      <div class="cc-row">
        <div class="cc-stat">
          <div class="cc-stat-v ve">+${BRL(c.entradas)}</div>
          <div class="cc-stat-l">Entradas</div>
        </div>
        <div class="cc-stat">
          <div class="cc-stat-v vs">−${BRL(c.saidas)}</div>
          <div class="cc-stat-l">Saídas</div>
        </div>
        <div class="cc-stat">
          <div class="cc-stat-v">${c.transactions.length}</div>
          <div class="cc-stat-l">Transações</div>
        </div>
      </div>
      <svg class="cc-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </div>`;
  }).join('');

  showView('summary');
}

// ── Detail view ───────────────────────────────────────────────────────────
function openClient(idx){
  const c=_clients[idx];
  if(!c) return;
  _filter='TODOS';
  // destroy charts
  Object.values(_charts).forEach(ch=>{try{ch.destroy()}catch(e){}});
  _charts={};

  const tx=c.transactions;
  const entradas=c.entradas,saidas=c.saidas,saldo=c.saldo;
  const saldoPos=saldo>=0;

  // cats
  const cats={};
  tx.filter(t=>t.direction==='SAÍDA').forEach(t=>{
    const k=t.tipo||'GERAL'; cats[k]=(cats[k]||0)+t.valor;
  });
  const topCats=Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,10);

  // mensal
  const mes={};
  tx.forEach(t=>{
    const m=getMes(t.date); if(!m) return;
    if(!mes[m]) mes[m]={e:0,s:0};
    if(t.direction==='ENTRADA') mes[m].e+=t.valor; else mes[m].s+=t.valor;
  });
  const mKeys=MESES.filter(m=>mes[m]);
  const mLabels=mKeys.map(m=>MMES[m]||m);
  let cum=0;
  const mSaldo=mKeys.map(m=>{cum+=mes[m].e-mes[m].s;return+cum.toFixed(2);});
  const mEnt=mKeys.map(m=>mes[m].e);
  const mSai=mKeys.map(m=>mes[m].s);

  const tipos=['TODOS',...new Set(tx.filter(t=>t.tipo).map(t=>t.tipo))];

  const kpiHTML = c.isBilling ? `
      <div class="kpi-card" style="--accent:#f59e0b">
        <div class="kpi-label">Em Aberto (Período Atual)</div>
        <div class="kpi-value" style="--kv:#fcd34d">${BRL(c.lastPeriodSaldo||saidas)}</div>
        <div class="kpi-sub">Aguardando pagamento do cliente</div>
      </div>
      <div class="kpi-card" style="--accent:#ef4444">
        <div class="kpi-label">Total Cobrado (Histórico)</div>
        <div class="kpi-value" style="--kv:#fca5a5">${BRL(saidas)}</div>
        <div class="kpi-sub">${tx.length} lançamentos</div>
      </div>
      <div class="kpi-card" style="--accent:#3b8bff">
        <div class="kpi-label">Regime</div>
        <div class="kpi-value" style="--kv:rgba(255,255,255,0.9);font-size:14px;padding-top:4px">Faturamento Mensal</div>
        <div class="kpi-sub">Pagamento ao final de cada período</div>
      </div>` : `
      <div class="kpi-card" style="--accent:${saldoPos?'#10b981':'#ef4444'}">
        <div class="kpi-label">Saldo Atual</div>
        <div class="kpi-value" style="--kv:${saldoPos?'#6ee7b7':'#fca5a5'}">${BRL(saldo)}</div>
        <div class="kpi-sub">${tx.length} transações registradas</div>
      </div>
      <div class="kpi-card" style="--accent:#10b981">
        <div class="kpi-label">Total Entradas</div>
        <div class="kpi-value" style="--kv:#6ee7b7">${BRL(entradas)}</div>
        <div class="kpi-sub">${tx.filter(t=>t.direction==='ENTRADA').length} antecipações</div>
      </div>
      <div class="kpi-card" style="--accent:#ef4444">
        <div class="kpi-label">Total Saídas</div>
        <div class="kpi-value" style="--kv:#fca5a5">${BRL(saidas)}</div>
        <div class="kpi-sub">${tx.filter(t=>t.direction==='SAÍDA').length} lançamentos</div>
      </div>`;

  document.getElementById('detail-content').innerHTML=`
    <div class="client-header">
      <div class="client-label">${c.isBilling?'Faturamento Mensal':'Antecipação de Saldos'}</div>
      <div class="client-name">${c.name}</div>
    </div>

    <div class="kpi-grid">${kpiHTML}</div>

    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">Gastos por Categoria</div>
        <div style="position:relative;height:${Math.max(180,topCats.length*34)}px">
          <canvas id="ch-cats"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Entradas × Saídas por Mês</div>
        <div style="position:relative;height:${Math.max(180,topCats.length*34)}px">
          <canvas id="ch-mes"></canvas>
        </div>
      </div>
    </div>

    <div class="table-section">
      <div class="table-hd">
        <div class="table-title">Extrato Completo</div>
        <div class="filter-row" id="filters">
          ${tipos.map(t=>`<button class="fb${t==='TODOS'?' active':''}" onclick="setFilter('${t}',${idx})">${t}</button>`).join('')}
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Data</th><th>Descrição</th><th>Categoria</th><th>Tipo</th><th class="r">Valor</th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>`;

  showView('detail');
  renderTable(tx);
  buildChartCats(topCats);
  buildChartMes(mLabels,mEnt,mSai,mSaldo);
}

function backToSummary(){
  Object.values(_charts).forEach(ch=>{try{ch.destroy()}catch(e){}});
  _charts={};
  showView('summary');
}

function renderTable(tx){
  const data=_filter==='TODOS'?tx:tx.filter(t=>t.tipo===_filter);
  const tbody=document.getElementById('tbody');
  if(!tbody) return;
  tbody.innerHTML=data.map(t=>`
    <tr>
      <td style="white-space:nowrap;color:var(--muted)">${t.date}</td>
      <td>${t.desc}</td>
      <td>${t.tipo?`<span class="tipo-tag">${t.tipo}</span>`:'<span style="color:var(--muted)">—</span>'}</td>
      <td><span class="badge badge-${t.direction==='ENTRADA'?'e':'s'}">${t.direction}</span></td>
      <td class="r ${t.direction==='ENTRADA'?'ve':'vs'}">${t.direction==='ENTRADA'?'+':'−'} ${BRL(t.valor)}</td>
    </tr>`).join('');
}

function setFilter(f,idx){
  _filter=f;
  document.querySelectorAll('.fb').forEach(b=>b.classList.toggle('active',b.textContent===f));
  renderTable(_clients[idx].transactions);
}

// ── Charts ─────────────────────────────────────────────────────────────────
const PAL=['#3b8bff','#c9963c','#10b981','#8b5cf6','#ef4444','#f97316','#06b6d4','#ec4899','#84cc16','#6366f1'];
const TK={color:'rgba(255,255,255,0.4)',font:{family:'Montserrat',size:10}};

function buildChartCats(cats){
  const ctx=document.getElementById('ch-cats');
  if(!ctx) return;
  if(_charts.cats) _charts.cats.destroy();
  _charts.cats=new Chart(ctx,{
    type:'bar',
    data:{
      labels:cats.map(([k])=>k),
      datasets:[{data:cats.map(([,v])=>v),
        backgroundColor:cats.map((_,i)=>PAL[i%PAL.length]+'55'),
        borderColor:cats.map((_,i)=>PAL[i%PAL.length]),
        borderWidth:1.5,borderRadius:5}]
    },
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+BRL(c.parsed.x)}}},
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{...TK,callback:v=>BRL(v)},border:{display:false}},
        y:{grid:{display:false},ticks:{color:'rgba(255,255,255,0.75)',font:{family:'Montserrat',size:10,weight:'700'}},border:{display:false}}
      }
    }
  });
}

function buildChartMes(labels,entradas,saidas,saldo){
  const ctx=document.getElementById('ch-mes');
  if(!ctx) return;
  if(_charts.mes) _charts.mes.destroy();
  _charts.mes=new Chart(ctx,{
    data:{labels,datasets:[
      {type:'bar',label:'Entradas',data:entradas,backgroundColor:'rgba(16,185,129,0.25)',borderColor:'#10b981',borderWidth:1.5,borderRadius:4,yAxisID:'y'},
      {type:'bar',label:'Saídas',data:saidas,backgroundColor:'rgba(239,68,68,0.22)',borderColor:'#ef4444',borderWidth:1.5,borderRadius:4,yAxisID:'y'},
      {type:'line',label:'Saldo acumulado',data:saldo,borderColor:'#3b8bff',backgroundColor:'rgba(59,139,255,0.08)',borderWidth:2.5,pointBackgroundColor:'#3b8bff',pointRadius:4,tension:.3,fill:true,yAxisID:'y2'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{labels:{color:'rgba(255,255,255,0.45)',font:{family:'Montserrat',size:10},boxWidth:10,padding:12}},
        tooltip:{callbacks:{label:c=>c.dataset.label+': '+BRL(c.parsed.y)}}
      },
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:TK,border:{display:false}},
        y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{...TK,callback:v=>BRL(v)},border:{display:false}},
        y2:{position:'right',grid:{display:false},ticks:{color:'rgba(59,139,255,0.6)',font:{family:'Montserrat',size:10},callback:v=>BRL(v)},border:{display:false}}
      }
    }
  });
}

// ── View helpers ──────────────────────────────────────────────────────────
function showView(v){
  document.getElementById('view-loading').style.display=v==='loading'?'block':'none';
  document.getElementById('view-summary').style.display=v==='summary'?'block':'none';
  document.getElementById('view-detail').style.display=v==='detail'?'block':'none';
}

function setMsg(m){const el=document.getElementById('load-msg');if(el)el.textContent=m;}

function showErr(msg){
  showView('loading');
  document.getElementById('view-loading').innerHTML=`
    <div class="loading">
      <div style="font-size:36px">⚠️</div>
      <div style="max-width:400px;line-height:1.7;color:rgba(255,255,255,0.6)">${msg}</div>
      <button class="btn-refresh" onclick="loadAll()" style="margin-top:8px">
        <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Tentar novamente
      </button>
    </div>`;
}

// hide nav when embedded (admin iframe)
if(new URLSearchParams(location.search).get('embed')==='1'){
  document.querySelector('.topnav').style.display='none';
}

// auto-refresh 5 min
setInterval(()=>{
  if(document.getElementById('view-summary').style.display!=='none') loadAll();
},5*60*1000);

loadAll();
</script>
</body>
</html>
