<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Antecipação de Saldos — Soma Partners</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0b1e30;--blue:#3b8bff;--gold:#c9963c;--green:#10b981;--red:#ef4444;--border:rgba(255,255,255,0.08);--muted:rgba(255,255,255,0.4);--surface:rgba(255,255,255,0.04)}
html,body{min-height:100%;background:var(--navy);font-family:'Montserrat',sans-serif;color:#fff;font-size:13px}

/* NAV */
.topnav{background:rgba(11,30,48,0.98);border-bottom:1px solid var(--border);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-left{display:flex;align-items:center;gap:14px}
.logo-soma{font-size:17px;font-weight:300}.logo-pipe{width:1px;height:20px;background:rgba(255,255,255,0.3)}.logo-partners{font-size:10px;font-weight:700;letter-spacing:5px;text-transform:uppercase;opacity:.7}
.nav-sep{width:1px;height:24px;background:var(--border)}.nav-title{font-size:13px;font-weight:800}
.nav-right{display:flex;align-items:center;gap:12px}
.last-updated{font-size:10px;color:var(--muted)}
.btn-refresh{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.7);font-size:11px;font-weight:700;font-family:'Montserrat',sans-serif;cursor:pointer;transition:all .18s}
.btn-refresh:hover{background:rgba(255,255,255,0.1);color:#fff}
.btn-refresh.loading{opacity:.6;pointer-events:none}
.btn-refresh svg{width:13px;height:13px;stroke:currentColor;stroke-width:2.5;fill:none}
.btn-refresh.loading svg{animation:spin .7s linear infinite}

/* BREADCRUMB / BACK */
.breadcrumb{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);cursor:pointer;padding:28px 40px 0;transition:color .15s}
.breadcrumb:hover{color:#fff}
.breadcrumb svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.5;fill:none}

/* SUMMARY header */
.summary-hd{padding:32px 40px 24px;border-bottom:1px solid var(--border)}
.summary-label{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.summary-title{font-size:26px;font-weight:900;letter-spacing:-.5px}
.summary-sub{font-size:11px;color:var(--muted);margin-top:4px}

/* CLIENT CARDS GRID */
.clients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:28px 40px}
.client-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px 24px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.client-card:hover{background:rgba(255,255,255,0.07);border-color:rgba(59,139,255,0.3);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,0.25)}
.client-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--acc,var(--blue))}
.cc-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.cc-name{font-size:14px;font-weight:800;margin-bottom:14px;line-height:1.3}
.cc-saldo{font-size:22px;font-weight:900;letter-spacing:-.5px;margin-bottom:4px;color:var(--sv,#fff)}
.cc-sub{font-size:10px;color:var(--muted)}
.cc-stats{display:grid;grid-template-columns:1fr auto;grid-template-rows:auto auto;column-gap:12px;row-gap:7px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.cc-stat-row{display:flex;flex-direction:column;gap:2px;min-width:0}
.cc-count{grid-column:2;grid-row:1/3;display:flex;flex-direction:column;align-items:center;justify-content:center;border-left:1px solid var(--border);padding-left:12px;min-width:44px}
.cc-stat-v{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc-stat-l{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.cc-arrow{position:absolute;bottom:20px;right:20px;opacity:.25;transition:opacity .2s}
.client-card:hover .cc-arrow{opacity:.7}

/* DETAIL ─ CLIENT HEADER */
.client-header{padding:32px 40px 24px;border-bottom:1px solid var(--border)}
.client-label{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.client-name{font-size:26px;font-weight:900;letter-spacing:-.5px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:28px 40px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px 24px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent,var(--blue))}
.kpi-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.kpi-value{font-size:24px;font-weight:800;letter-spacing:-.5px;color:var(--kv,#fff)}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:5px}

/* CHARTS */
.charts-grid{display:grid;grid-template-columns:5fr 6fr;gap:16px;padding:0 40px 24px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px 24px}
.chart-title{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:18px}

/* TABLE */
.table-section{padding:0 40px 60px}
.table-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.table-title{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.filter-row{display:flex;gap:6px;flex-wrap:wrap}
.fb{padding:4px 11px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.45);font-size:10px;font-weight:700;font-family:'Montserrat',sans-serif;cursor:pointer;transition:all .15s}
.fb:hover{color:#fff}.fb.active{border-color:rgba(59,139,255,0.45);background:rgba(59,139,255,0.1);color:#fff}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{border-bottom:1px solid rgba(255,255,255,0.1)}
thead th{padding:10px 14px;font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-align:left;white-space:nowrap}
tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);transition:background .12s}
tbody tr:hover{background:rgba(255,255,255,0.03)}
tbody td{padding:11px 14px;font-size:12px;color:rgba(255,255,255,.85)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.badge-e{background:rgba(16,185,129,0.14);color:#6ee7b7;border:1px solid rgba(16,185,129,0.2)}
.badge-s{background:rgba(239,68,68,0.1);color:#fca5a5;border:1px solid rgba(239,68,68,0.15)}
.tipo-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase;background:rgba(201,150,60,0.1);color:rgba(201,150,60,0.8);border:1px solid rgba(201,150,60,0.15)}
.ve{color:#6ee7b7;font-weight:700}.vs{color:#fca5a5;font-weight:700}
th.r,td.r{text-align:right}

/* LOADING / ERROR */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;color:var(--muted);font-size:12px;text-align:center}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.08);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
.load-msg{font-size:11px;color:var(--muted);max-width:280px;line-height:1.6}
@keyframes spin{to{transform:rotate(360deg)}}

/* REPORT BUTTON */
.btn-rpt{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:9px;border:1px solid rgba(59,139,255,0.35);background:rgba(59,139,255,0.1);color:#fff;font-size:11px;font-weight:800;font-family:'Montserrat',sans-serif;cursor:pointer;transition:all .18s;letter-spacing:.3px;white-space:nowrap}
.btn-rpt:hover{background:rgba(59,139,255,0.22);border-color:rgba(59,139,255,0.6);box-shadow:0 4px 18px rgba(59,139,255,0.2)}
.btn-rpt svg{flex-shrink:0}

/* REPORT MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;animation:fadein .18s}
.modal-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:201;background:#0f2540;border:1px solid rgba(255,255,255,0.11);border-radius:18px;width:min(480px,94vw);box-shadow:0 24px 80px rgba(0,0,0,.55);animation:slidein .2s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
@keyframes slidein{from{opacity:0;transform:translate(-50%,-47%)}to{opacity:1;transform:translate(-50%,-50%)}}
.modal-hd{padding:24px 28px 18px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:flex-start;justify-content:space-between}
.modal-title{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.modal-cname{font-size:18px;font-weight:900}
.modal-x{background:none;border:none;color:rgba(255,255,255,.3);font-size:20px;cursor:pointer;padding:0 4px;border-radius:5px;transition:color .15s;line-height:1}
.modal-x:hover{color:#fff}
.modal-body{padding:20px 28px}
.modal-sec{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.modal-dates{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.dg label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px}
.dg input{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.11);border-radius:8px;color:#fff;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600;padding:8px 10px;width:100%;outline:none;transition:border-color .15s}
.dg input:focus{border-color:rgba(59,139,255,.5);background:rgba(59,139,255,.06)}
.dg input::-webkit-calendar-picker-indicator{filter:invert(.55)}
.quick-dates{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.qd{padding:4px 11px;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.45);font-size:10px;font-weight:700;font-family:'Montserrat',sans-serif;cursor:pointer;transition:all .14s}
.qd:hover{color:#fff;border-color:rgba(255,255,255,.25)}.qd.active{background:rgba(59,139,255,.12);border-color:rgba(59,139,255,.4);color:#fff}
.checks{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ck-row{display:flex;align-items:center;gap:9px;padding:10px 12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:9px;cursor:pointer;transition:background .14s}
.ck-row:hover{background:rgba(255,255,255,.07)}
.ck-row input{accent-color:var(--blue);width:14px;height:14px;cursor:pointer;flex-shrink:0}
.ck-row span{font-size:11px;font-weight:600;color:rgba(255,255,255,.8)}
.modal-ft{padding:16px 28px 22px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid rgba(255,255,255,.07)}
.btn-cancel{padding:9px 18px;border-radius:9px;border:1px solid rgba(255,255,255,.12);background:transparent;color:rgba(255,255,255,.5);font-size:11px;font-weight:700;font-family:'Montserrat',sans-serif;cursor:pointer;transition:all .15s}
.btn-cancel:hover{color:#fff;border-color:rgba(255,255,255,.25)}
.btn-gen{display:inline-flex;align-items:center;gap:6px;padding:9px 22px;border-radius:9px;border:none;background:var(--blue);color:#fff;font-size:11px;font-weight:800;font-family:'Montserrat',sans-serif;cursor:pointer;transition:all .15s;letter-spacing:.3px}
.btn-gen:hover{background:#5a9fff;box-shadow:0 4px 20px rgba(59,139,255,.35)}
.lang-toggle{display:flex;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,.12)}
.lang-btn{padding:5px 13px;background:transparent;border:none;color:rgba(255,255,255,.4);font-size:11px;font-weight:800;font-family:'Montserrat',sans-serif;cursor:pointer;transition:all .14s;letter-spacing:.5px}
.lang-btn.active{background:rgba(59,139,255,.18);color:#fff}
.lang-btn:hover:not(.active){color:rgba(255,255,255,.7)}

@media(max-width:900px){
  .charts-grid{grid-template-columns:1fr}
  .kpi-grid,.clients-grid{grid-template-columns:1fr}
  .kpi-grid,.clients-grid,.summary-hd,.client-header,.table-section,.charts-grid{padding-left:20px;padding-right:20px}
  .topnav{padding:0 16px}.last-updated{display:none}
  .breadcrumb{padding:20px 20px 0}
}
</style>
</head>
<body>

<nav class="topnav">
  <div class="nav-left">
    <span class="logo-soma">Soma</span>
    <div class="logo-pipe"></div>
    <span class="logo-partners">Partners</span>
    <div class="nav-sep"></div>
    <span class="nav-title">Antecipação de Saldos</span>
  </div>
  <div class="nav-right">

    <button class="btn-refresh" id="btn-refresh" onclick="loadAll()">

      Atualizar
    </button>
  </div>
</nav>

<!-- View: Summary -->
<div id="view-summary" style="display:none">

    <div class="summary-title">Todos os Clientes</div>

<!-- View: Detail -->

<!-- Report Modal -->
<div id="rpt-modal" style="display:none;position:fixed;inset:0;z-index:200">
  <div class="modal-overlay" onclick="closeRpt()"></div>

    <div class="modal-hd">

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">

        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)">Idioma</span>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const SHEET_ID = '2PACX-1vTzhi6lcErPeiH-CUwSxXXAS1EIW-elVoY0iHWCjoN5KrHXG6qEhdeaIZHOD5AhSP0v7gsFVEsc3hUy';
const BASE    = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}`;
const PUBHTML = `${BASE}/pubhtml`;
const CSVBASE = `${BASE}/pub?output=csv`;

let _clients  = [];   // [{name, gid, transactions, entradas, saidas, saldo}]
let _filter   = 'TODOS';
let _charts   = {};

// ── Utils ─────────────────────────────────────────────────────────────────
const BRL = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v);

function parseVal(s){
  if(!s) return 0;
  const raw=String(s).trim();
  if(raw==='-'||raw==='R$ -'||raw==='R$-') return 0;
  // Remove currency symbol, spaces, non-numeric except , . -
  const c=raw
    .replace(/R\$\s*/gi,'')   // R$
    .replace(/\s+/g,'')       // spaces
    .replace(/\.(?=\d{3})/g,'') // thousand-separator dots (1.000,00 → 1000,00)
    .replace(',','.')          // decimal comma → dot
    .replace(/[^\d.\-]/g,''); // anything else
  const n=parseFloat(c);
  return isNaN(n)?0:Math.abs(n);
}

const MESES=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const MMES={jan:'Jan',fev:'Fev',mar:'Mar',abr:'Abr',mai:'Mai',jun:'Jun',jul:'Jul',ago:'Ago',set:'Set',out:'Out',nov:'Nov',dez:'Dez'};
function getMes(d){const m=String(d).match(/-([a-záéíóú]+)\.?/i);return m?m[1].toLowerCase():'';}

// ── Tab discovery ─────────────────────────────────────────────────────────
async function discoverTabs(){
  try {
    const html = await fetch(`${PUBHTML}?_=${Date.now()}`).then(r=>r.text());
    const doc  = new DOMParser().parseFromString(html,'text/html');
    const tabs = [];
    doc.querySelectorAll('[id^="sheet-button-"]').forEach(el=>{
      const gid  = el.id.replace('sheet-button-','');
      const name = (el.querySelector('a')||el).textContent.trim();
      if(gid&&name) tabs.push({gid,name});
    });
    if(tabs.length) return tabs;
    // fallback: look for data-sheet-id attrs or hrefs
    const found=[];
    html.match(/gid=(\d+)/g)?.forEach(m=>{
      const gid=m.replace('gid=','');
      if(!found.find(t=>t.gid===gid)) found.push({gid,name:`Aba ${found.length+1}`});
    });
    if(found.length) return found;
  } catch(e) { /* ignore */ }
  // ultimate fallback
  return [{gid:'1715413438',name:'LUI MARK JENJON AC'}];
}

// ── CSV parse ─────────────────────────────────────────────────────────────
function processSheet(rows){
  let clientName='', headerIdx=-1, saldoCol=-1;

  // Scan row 0 for client name and SALDO column position
  (rows[0]||[]).forEach((c,i)=>{
    const v=String(c||'').trim();
    if(!clientName&&v) clientName=v;
    if(v.toUpperCase()==='SALDO') saldoCol=i;
  });

  // Find first DATA header row
  for(let i=0;i<rows.length;i++){
    const f=(rows[i][0]||'').trim();
    if(f.toUpperCase()==='DATA'){
      headerIdx=i;
      // Fallback: find SALDO col from header row
      if(saldoCol<0) rows[i].forEach((c,j)=>{
        if(String(c||'').trim().toUpperCase()==='SALDO') saldoCol=j;
      });
      break;
    }
    if(f&&!clientName) clientName=f;
  }
  if(headerIdx<0) return null;

  const tx=[];
  let lastPeriodSaldo=null;

  // Capture saldo from first header row itself (GOL DO RAYO pattern)
  if(saldoCol>=0){
    const v=parseVal(rows[headerIdx][saldoCol]);
    if(v) lastPeriodSaldo=v;
  }

  for(let i=headerIdx+1;i<rows.length;i++){
    const row=rows[i];
    const date=(row[0]||'').trim(); if(!date) continue;

    // Repeated header row (period separator) — capture its SALDO and skip
    if(date.toUpperCase()==='DATA'||date.toUpperCase()==='DATE'){
      if(saldoCol>=0){const v=parseVal(row[saldoCol]);if(v) lastPeriodSaldo=v;}
      continue;
    }

    const desc=(row[1]||'').trim();
    const tipo=(row[2]||'').trim();
    const dirRaw=(row[3]||'').trim().toUpperCase()
      .normalize('NFD').replace(/[̀-ͯ]/g,''); // strip accents for comparison
    const val=parseVal(row[4]);

    // Skip zero-value rows
    if(!val) continue;

    // Direction: explicit ENTRADA wins; everything else is SAÍDA
    // (handles blank, "SAIDA" without accent, lowercase, etc.)
    const direction = dirRaw.startsWith('EN') ? 'ENTRADA' : 'SAÍDA';
    tx.push({date,desc,tipo,direction,valor:val});
  }
  if(!tx.length) return null;

  const entradas=tx.filter(t=>t.direction==='ENTRADA').reduce((s,t)=>s+t.valor,0);
  const saidas  =tx.filter(t=>t.direction==='SAÍDA').reduce((s,t)=>s+t.valor,0);
  // Billing type (GOL DO RAYO): no entradas — client pays monthly; saldo = current period total
  const isBilling = entradas===0;
  const rawSaldo = isBilling
    ? (lastPeriodSaldo!=null ? -lastPeriodSaldo : -saidas)
    : entradas - saidas;
  // Round to 2 decimal places to avoid floating-point artifacts like -0.000001
  const saldo = Math.round(rawSaldo * 100) / 100;

  return {clientName,transactions:tx,entradas,saidas,saldo,isBilling,lastPeriodSaldo};
}

// ── Main load ─────────────────────────────────────────────────────────────
async function loadAll(){
  showView('loading');
  setMsg('Descobrindo abas da planilha...');
  const btn=document.getElementById('btn-refresh');
  if(btn) btn.classList.add('loading');

  try{
    const tabs=await discoverTabs();
    setMsg(`Carregando ${tabs.length} cliente(s)...`);

    const results=await Promise.allSettled(tabs.map(async tab=>{
      const url=`${CSVBASE}&gid=${tab.gid}&_=${Date.now()}`;
      const res=await fetch(url);
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const csv=await res.text();
      if(!csv||csv.length<20) return null;
      return new Promise((resolve,reject)=>{
        Papa.parse(csv,{
          skipEmptyLines:false,
          complete:r=>{
            const d=processSheet(r.data);
            if(!d) resolve(null);
            else resolve({...tab,...d,name:d.clientName||tab.name});
          },
          error:e=>reject(e)
        });
      });
    }));

    _clients=results
      .filter(r=>r.status==='fulfilled'&&r.value)
      .map(r=>r.value);

    if(!_clients.length){
      showErr('Nenhuma aba com dados encontrada. Verifique se a planilha está publicada.');
      return;
    }

    const lu=document.getElementById('lu');
    if(lu) lu.textContent='Atualizado às '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

    renderSummary();

  } catch(e){
    showErr('Erro ao carregar: '+(e.message||e));
  } finally {
    if(btn) btn.classList.remove('loading');
  }
}

const MMAP_D = {jan:0,fev:1,mar:2,abr:3,mai:4,jun:5,jul:6,ago:7,set:8,out:9,nov:10,dez:11};

function txToDate(d){
  const s=String(d).trim();
  const m1=s.match(/(\d{1,2})[\/\-]([a-záéíóú]+)\.?\s*(\d{4})/i);
  if(m1){const mon=MMAP_D[m1[2].toLowerCase().slice(0,3)];if(mon!==undefined) return new Date(+m1[3],mon,+m1[1]);}
  const m2=s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m2) return new Date(+m2[3],+m2[2]-1,+m2[1]);
  return null;
}
function toISO(d){return d.toISOString().slice(0,10);}

  else if(p==='m'){fi.value=toISO(new Date(n.getFullYear(),n.getMonth(),1));ti.value=toISO(new Date(n.getFullYear(),n.getMonth()+1,0));}

  else if(p==='y'){fi.value=toISO(new Date(n.getFullYear(),0,1));ti.value=toISO(new Date(n.getFullYear(),11,31));}
}

  let tx=c.transactions;
  const fd=fv?new Date(fv+'T00:00:00'):null;
  const td=tv?new Date(tv+'T23:59:59'):null;
  if(fd||td){
    tx=tx.filter(t=>{
      const d=txToDate(t.date); if(!d) return true;
      if(fd&&d<fd) return false; if(td&&d>td) return false; return true;

  const ent=tx.filter(t=>t.direction==='ENTRADA').reduce((s,t)=>s+t.valor,0);

  const sal=Math.round((ent-sai)*100)/100;

  // ── Chart data (re-computed for light-mode rendering) ────────────────────
  const cats2={};
  tx.filter(t=>t.direction==='SAÍDA').forEach(t=>{const k=t.tipo||L.general;cats2[k]=(cats2[k]||0)+t.valor;});
  const topCats=Object.entries(cats2).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const mes2={};
  tx.forEach(t=>{const m=getMes(t.date);if(!m)return;if(!mes2[m])mes2[m]={e:0,s:0};if(t.direction==='ENTRADA')mes2[m].e+=t.valor;else mes2[m].s+=t.valor;});
  const mKeys2=MESES.filter(m=>mes2[m]);
  const mLbl2=mKeys2.map(m=>MMES[m]||m);
  let cum2=0;
  const mSaldo2=mKeys2.map(m=>{cum2+=mes2[m].e-mes2[m].s;return+cum2.toFixed(2);});
  const mEnt2=mKeys2.map(m=>mes2[m].e);
  const mSai2=mKeys2.map(m=>mes2[m].s);

  const PAL_P=['#3b8bff','#c9963c','#10b981','#8b5cf6','#ef4444','#f97316','#06b6d4','#ec4899','#84cc16','#6366f1'];
  const catBg=topCats.map((_,i)=>PAL_P[i%PAL_P.length]+'66');
  const catBd=topCats.map((_,i)=>PAL_P[i%PAL_P.length]);

  const fmt=d=>d.split('-').reverse().join('/');
  const period=(!fv&&!tv)?L.allPeriodText:(fv&&tv)?`${fmt(fv)} – ${fmt(tv)}`:fv?`${L.from} ${fmt(fv)}`:`${L.until} ${fmt(tv)}`;
  const locale=_rptLang==='en'?'en-US':'pt-BR';
  const genDate=new Date().toLocaleDateString(locale,{day:'2-digit',month:'long',year:'numeric'});

  // ── KPI HTML ──────────────────────────────────────────────────────────────
  const kHtml=incKPI?(c.isBilling?`
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px">
      ${kpiCard(L.openAmount,BRL(c.lastPeriodSaldo||sai),L.awaitingPayment,'#f59e0b')}
      ${kpiCard(L.totalCharged,BRL(sai),tx.length+' '+L.launches,'#ef4444')}
      ${kpiCard(L.regime,L.monthlyBilling,L.paymentAtEnd,'#3b8bff')}
    </div>`:`
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px">
      ${kpiCard(L.currentBalance,BRL(sal),tx.length+' '+L.transactions,sal>=0?'#10b981':'#ef4444')}
      ${kpiCard(L.totalEntradas,BRL(ent),tx.filter(t=>t.direction==='ENTRADA').length+' '+L.anticipations,'#10b981')}
      ${kpiCard(L.totalSaidas,BRL(sai),tx.filter(t=>t.direction==='SAÍDA').length+' '+L.launches,'#ef4444')}
    </div>`):'';

  // ── Charts HTML — canvas elements (re-rendered with light theme) ──────────
  const showCat=incCat&&topCats.length>0;
  const showMes=incMes&&mKeys2.length>0;
  const chHtml=(showCat||showMes)?`
    <div style="display:grid;grid-template-columns:${showCat&&showMes?'1fr 1fr':'1fr'};gap:14px;margin-bottom:28px">
      ${showCat?`<div style="background:#f8faff;border:1px solid #e5e7eb;border-radius:11px;padding:16px 18px">
        <div style="font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#6b7280;margin-bottom:12px">${L.expensesByCategory}</div>
        <div style="position:relative;height:${Math.max(160,topCats.length*34)}px"><canvas id="ch-cats-p"></canvas></div>
      </div>`:''}
      ${showMes?`<div style="background:#f8faff;border:1px solid #e5e7eb;border-radius:11px;padding:16px 18px">
        <div style="font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#6b7280;margin-bottom:12px">${L.monthlyFlow}</div>
        <div style="position:relative;height:220px"><canvas id="ch-mes-p"></canvas></div>
      </div>`:''}
    </div>`:'';

  // ── Table HTML ────────────────────────────────────────────────────────────
  const tHtml=incTbl?`
    <div>
      <div style="font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#6b7280;margin-bottom:12px">${L.extractTitle} — ${tx.length} ${L.launches.toUpperCase()}</div>
      <table style="width:100%;border-collapse:collapse;font-size:11px">
        <thead><tr style="border-bottom:2px solid #e5e7eb">
          <th style="padding:8px 10px;text-align:left;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#9ca3af;white-space:nowrap">${L.date}</th>
          <th style="padding:8px 10px;text-align:left;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#9ca3af">${L.description}</th>
          <th style="padding:8px 10px;text-align:left;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#9ca3af">${L.category}</th>
          <th style="padding:8px 10px;text-align:left;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#9ca3af">${L.type}</th>
          <th style="padding:8px 10px;text-align:right;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#9ca3af">${L.amount}</th>
        </tr></thead>
        <tbody>${tx.map((t,i)=>`
          <tr style="border-bottom:1px solid #f3f4f6;background:${i%2===0?'#fff':'#fafafa'}">
            <td style="padding:8px 10px;color:#6b7280;white-space:nowrap">${t.date}</td>
            <td style="padding:8px 10px;color:#374151">${t.desc||'—'}</td>
            <td style="padding:8px 10px"><span style="background:#fef3c7;color:#92400e;border-radius:4px;padding:2px 7px;font-size:9px;font-weight:700;text-transform:uppercase">${t.tipo||L.general}</span></td>
            <td style="padding:8px 10px"><span style="background:${t.direction==='ENTRADA'?'#d1fae5':'#fee2e2'};color:${t.direction==='ENTRADA'?'#065f46':'#991b1b'};border-radius:4px;padding:2px 7px;font-size:9px;font-weight:700">${t.direction==='ENTRADA'?L.entrada:L.saida}</span></td>
            <td style="padding:8px 10px;text-align:right;font-weight:700;color:${t.direction==='ENTRADA'?'#059669':'#dc2626'}">${t.direction==='ENTRADA'?'+':'−'} ${BRL(t.valor)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`:'';

  // ── Chart init script (light-mode: dark labels on white background) ────────
  const brlFn=`function brl(v){return new Intl.NumberFormat('${locale}',{style:'currency',currency:'BRL'}).format(v);}`;
  let chartJs='';
  if(showCat){chartJs+=`
  new Chart(document.getElementById('ch-cats-p'),{type:'bar',data:{
    labels:${JSON.stringify(topCats.map(([k])=>k))},
    datasets:[{data:${JSON.stringify(topCats.map(([,v])=>v))},
      backgroundColor:${JSON.stringify(catBg)},borderColor:${JSON.stringify(catBd)},borderWidth:1.5,borderRadius:5}]
  },options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return' '+brl(c.parsed.x);}}}},
    scales:{
      x:{grid:{color:'rgba(0,0,0,0.06)'},ticks:{color:'#6b7280',font:{family:'Montserrat',size:10},callback:function(v){return brl(v);}},border:{display:false}},
      y:{grid:{display:false},ticks:{color:'#111',font:{family:'Montserrat',size:10,weight:'700'}},border:{display:false}}
    }
  }});`;}
  if(showMes){chartJs+=`
  new Chart(document.getElementById('ch-mes-p'),{data:{
    labels:${JSON.stringify(mLbl2)},
    datasets:[
      {type:'bar',label:${JSON.stringify(L.totalEntradas)},data:${JSON.stringify(mEnt2)},backgroundColor:'rgba(16,185,129,0.25)',borderColor:'#10b981',borderWidth:1.5,borderRadius:4,yAxisID:'y'},
      {type:'bar',label:${JSON.stringify(L.totalSaidas)},data:${JSON.stringify(mSai2)},backgroundColor:'rgba(239,68,68,0.2)',borderColor:'#ef4444',borderWidth:1.5,borderRadius:4,yAxisID:'y'},
      {type:'line',label:${JSON.stringify(L.currentBalance)},data:${JSON.stringify(mSaldo2)},borderColor:'#3b8bff',backgroundColor:'rgba(59,139,255,0.07)',borderWidth:2,pointBackgroundColor:'#3b8bff',pointRadius:3,tension:.3,fill:true,yAxisID:'y2'}
    ]
  },options:{responsive:true,maintainAspectRatio:false,
    plugins:{
      legend:{labels:{color:'#6b7280',font:{family:'Montserrat',size:10},boxWidth:10,padding:12}},
      tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+brl(c.parsed.y);}}}
    },
    scales:{
      x:{grid:{color:'rgba(0,0,0,0.06)'},ticks:{color:'#6b7280',font:{family:'Montserrat',size:10}},border:{display:false}},
      y:{grid:{color:'rgba(0,0,0,0.06)'},ticks:{color:'#6b7280',font:{family:'Montserrat',size:10},callback:function(v){return brl(v);}},border:{display:false}},
      y2:{position:'right',grid:{display:false},ticks:{color:'rgba(59,139,255,0.75)',font:{family:'Montserrat',size:10},callback:function(v){return brl(v);}},border:{display:false}}
    }
  }});`;}

  const scriptTag=(showCat||showMes)?`
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"><\/script>
<script>
${brlFn}
window.addEventListener('load',function(){${chartJs}
  setTimeout(function(){window.print();},600);
});
<\/script>`:``;

  // ── Compose HTML ──────────────────────────────────────────────────────────
  const html=`<!DOCTYPE html><html lang="${_rptLang}"><head><meta charset="UTF-8">
<meta name="viewport" content="width=794">
<title>Report — ${c.name}</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;overflow-x:hidden}
body{font-family:'Montserrat',sans-serif;background:#fff;color:#111;padding:28px 36px}
@media print{
  body{padding:0}
  @page{size:A4 portrait;margin:12mm 10mm}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
}
</style>
</head><body>
  <div style="display:flex;align-items:flex-start;justify-content:space-between;padding-bottom:20px;border-bottom:3px solid #0b1e30;margin-bottom:28px">
    <div>
      <div style="font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#c9963c;margin-bottom:6px">Soma Partners</div>
      <div style="font-size:26px;font-weight:900;letter-spacing:-.5px;color:#0b1e30">${c.name}</div>
      <div style="font-size:12px;color:#6b7280;margin-top:6px">${c.isBilling?L.billing:L.antecipacao} &nbsp;·&nbsp; ${period}</div>
    </div>
    <div style="text-align:right">
      <div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#9ca3af">${L.generatedOn}</div>
      <div style="font-size:12px;font-weight:700;color:#374151;margin-top:3px">${genDate}</div>
    </div>
  </div>
  ${kHtml}${chHtml}${tHtml}
  <div style="margin-top:40px;padding-top:14px;border-top:1px solid #e5e7eb;display:flex;justify-content:space-between">
    <div style="font-size:9px;color:#9ca3af;letter-spacing:1px;text-transform:uppercase">Soma Partners · ${L.confidential}</div>
    <div style="font-size:9px;color:#9ca3af">atendimento@somapartners.co</div>
  </div>
  ${scriptTag}
</body></html>`;

  const win=window.open('','_blank','width=900,height=700,scrollbars=yes');
  win.document.write(html);
  win.document.close();
  // If no charts, trigger print after font load delay
  if(!showCat&&!showMes) setTimeout(()=>{if(!win.closed)win.print();},900);
  closeRpt();
}

// hide nav when embedded (admin iframe)
if(new URLSearchParams(location.search).get('embed')==='1'){
  document.querySelector('.topnav').style.display='none';
}

// auto-refresh 5 min
setInterval(()=>{
  if(document.getElementById('view-summary').style.display!=='none') loadAll();
},5*60*1000);

loadAll();
</script>
</body>
</html>
