<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Soma Partners — Acesso</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0b1e30;--white:#fff;--indigo:#4f46e5;--border:rgba(255,255,255,0.09)}
html,body{height:100%;font-family:'Montserrat',sans-serif;background:var(--navy);color:var(--white);display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(79,70,229,0.12) 0%,transparent 60%);pointer-events:none}

.card{width:360px;display:flex;flex-direction:column;align-items:center}
.logo{display:flex;align-items:center;gap:16px;margin-bottom:48px}
.logo-soma{font-size:22px;font-weight:300;letter-spacing:0.5px}
.logo-pipe{width:1px;height:28px;background:rgba(255,255,255,0.4)}
.logo-partners{font-size:12px;font-weight:700;letter-spacing:5px;text-transform:uppercase}

.form{width:100%;display:flex;flex-direction:column;gap:14px}
.field{display:flex;flex-direction:column;gap:6px}
.label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.4)}
.input{width:100%;padding:13px 16px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;font-family:'Montserrat',sans-serif;font-size:14px;color:#fff;outline:none;transition:all 0.2s}
.input:focus{border-color:rgba(79,70,229,0.6);background:rgba(79,70,229,0.06)}
.input::placeholder{color:rgba(255,255,255,0.2)}

.pass-wrap{position:relative}
.pass-wrap .input{padding-right:44px}
.pass-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.3);display:flex;align-items:center;transition:color 0.18s;padding:0}
.pass-toggle:hover{color:rgba(255,255,255,0.7)}
.pass-toggle svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none}

.btn-submit{width:100%;padding:14px;background:var(--indigo);border:none;border-radius:10px;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:800;color:#fff;letter-spacing:1px;cursor:pointer;transition:all 0.2s;margin-top:4px}
.btn-submit:hover{background:#4338ca;transform:translateY(-1px);box-shadow:0 8px 24px rgba(79,70,229,0.35)}
.btn-submit:active{transform:translateY(0)}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none}

.msg{font-size:11px;font-weight:600;text-align:center;min-height:16px;transition:opacity 0.2s}
.msg.err{color:#fca5a5}
.msg.hide{opacity:0}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <span class="logo-soma">Soma</span>
    <div class="logo-pipe"></div>
    <span class="logo-partners">Partners</span>
  </div>

  <form class="form" onsubmit="handleLogin(event)">
    <div class="field">
      <label class="label">E-mail</label>
      <input class="input" id="l-email" type="email" placeholder="seu@email.com" autocomplete="email" required data-no-upper="1">
    </div>
    <div class="field">
      <label class="label">Senha</label>
      <div class="pass-wrap">
        <input class="input" id="l-senha" type="password" placeholder="••••••••" autocomplete="current-password" required data-no-upper="1">
        <button type="button" class="pass-toggle" onclick="togglePass()">
          <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <div class="msg hide" id="l-msg"></div>
    <button type="submit" class="btn-submit" id="l-btn">ENTRAR</button>
  </form>
</div>

<script>
const SUPA_URL='https://mdftseanzfganeiyotlf.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1kZnRzZWFuemZnYW5laXlvdGxmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNTcwODgsImV4cCI6MjA5MzgzMzA4OH0.ZUD-vjmF0QX80U6EK4vJK7uek23NzCSTocxSGYH4PDo';
const _sb=supabase.createClient(SUPA_URL,SUPA_KEY);

if(sessionStorage.getItem('soma_auth')==='1') window.location.href='soma-partners.html';

function togglePass(){
  const inp=document.getElementById('l-senha');
  inp.type=inp.type==='password'?'text':'password';
}

function showErr(msg){
  const el=document.getElementById('l-msg');
  el.textContent=msg;el.className='msg err';
  setTimeout(()=>el.className='msg hide',4000);
}

async function hashSenha(senha){
  const enc=new TextEncoder().encode(senha);
  const buf=await crypto.subtle.digest('SHA-256',enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function handleLogin(e){
  e.preventDefault();
  const btn=document.getElementById('l-btn');
  btn.disabled=true;btn.textContent='Verificando...';
  const email=document.getElementById('l-email').value.trim().toLowerCase();
  const senha=document.getElementById('l-senha').value;
  const hash=await hashSenha(senha);
  const{data}=await _sb.from('soma_usuarios').select('id,nome').eq('email',email).eq('senha_hash',hash).single();
  btn.disabled=false;btn.textContent='ENTRAR';
  if(data){
    sessionStorage.setItem('soma_auth','1');
    sessionStorage.setItem('soma_nome',data.nome||email);
    window.location.href='soma-partners.html';
  } else {
    showErr('E-mail ou senha incorretos');
    document.getElementById('l-senha').value='';
    document.getElementById('l-senha').focus();
  }
}
</script>
</body>
</html>
