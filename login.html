<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Soma Partners — Acesso</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0b1e30;--white:#fff;--indigo:#4f46e5;--border:rgba(255,255,255,0.09)}
html,body{height:100%;font-family:'Montserrat',sans-serif;background:var(--navy);color:var(--white);display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(79,70,229,0.12) 0%,transparent 60%);pointer-events:none}

.card{width:380px;display:flex;flex-direction:column;align-items:center}
.logo{display:flex;align-items:center;gap:16px;margin-bottom:44px}
.logo-soma{font-size:22px;font-weight:300;letter-spacing:0.5px}
.logo-pipe{width:1px;height:28px;background:rgba(255,255,255,0.4)}
.logo-partners{font-size:12px;font-weight:700;letter-spacing:5px;text-transform:uppercase}

/* TABS */
.tabs{display:flex;width:100%;margin-bottom:28px;background:rgba(255,255,255,0.04);border-radius:10px;padding:4px;gap:4px}
.tab{flex:1;padding:9px;border:none;border-radius:7px;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.18s;background:transparent;color:rgba(255,255,255,0.4)}
.tab.active{background:var(--indigo);color:#fff}

.form{width:100%;display:flex;flex-direction:column;gap:14px}
.field{display:flex;flex-direction:column;gap:6px}
.label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.4)}
.input{width:100%;padding:13px 16px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;font-family:'Montserrat',sans-serif;font-size:14px;color:#fff;outline:none;transition:all 0.2s}
.input:focus{border-color:rgba(79,70,229,0.6);background:rgba(79,70,229,0.06)}
.input::placeholder{color:rgba(255,255,255,0.2)}

.pass-wrap{position:relative}
.pass-wrap .input{padding-right:44px}
.pass-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.3);display:flex;align-items:center;transition:color 0.18s;padding:0}
.pass-toggle:hover{color:rgba(255,255,255,0.7)}
.pass-toggle svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none}

.btn-submit{width:100%;padding:14px;background:var(--indigo);border:none;border-radius:10px;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:800;color:#fff;letter-spacing:1px;cursor:pointer;transition:all 0.2s;margin-top:4px}
.btn-submit:hover{background:#4338ca;transform:translateY(-1px);box-shadow:0 8px 24px rgba(79,70,229,0.35)}
.btn-submit:active{transform:translateY(0)}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none}

.msg{font-size:11px;font-weight:600;text-align:center;min-height:16px;transition:opacity 0.2s}
.msg.err{color:#fca5a5}
.msg.ok{color:#6ee7b7}
.msg.hide{opacity:0}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <span class="logo-soma">Soma</span>
    <div class="logo-pipe"></div>
    <span class="logo-partners">Partners</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Entrar</button>
    <button class="tab" onclick="switchTab('cadastro')">Criar conta</button>
  </div>

  <!-- LOGIN -->
  <form class="form" id="form-login" onsubmit="handleLogin(event)">
    <div class="field">
      <label class="label">E-mail</label>
      <input class="input" id="l-email" type="email" placeholder="seu@email.com" autocomplete="email" required data-no-upper="1">
    </div>
    <div class="field">
      <label class="label">Senha</label>
      <div class="pass-wrap">
        <input class="input" id="l-senha" type="password" placeholder="••••••••" autocomplete="current-password" required data-no-upper="1">
        <button type="button" class="pass-toggle" onclick="togglePass('l-senha')">
          <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <div class="msg hide" id="l-msg"></div>
    <button type="submit" class="btn-submit" id="l-btn">ENTRAR</button>
  </form>

  <!-- CADASTRO -->
  <form class="form" id="form-cadastro" style="display:none" onsubmit="handleCadastro(event)">
    <div class="field">
      <label class="label">Seu nome</label>
      <input class="input" id="c-nome" type="text" placeholder="Nome completo" required>
    </div>
    <div class="field">
      <label class="label">E-mail</label>
      <input class="input" id="c-email" type="email" placeholder="seu@email.com" required data-no-upper="1">
    </div>
    <div class="field">
      <label class="label">Senha</label>
      <div class="pass-wrap">
        <input class="input" id="c-senha" type="password" placeholder="Mínimo 6 caracteres" required data-no-upper="1">
        <button type="button" class="pass-toggle" onclick="togglePass('c-senha')">
          <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <div class="msg hide" id="c-msg"></div>
    <button type="submit" class="btn-submit" id="c-btn">CRIAR CONTA</button>
  </form>
</div>

<script>
const SUPA_URL='https://fqdhaaslmiprvifttmpb.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxZGhhYXNsbWlwcnZpZnR0bXBiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MDkxNTcsImV4cCI6MjA5MzQ4NTE1N30.iJouT1ztgAnmxpowiWFusoaMbIIZYWathTcW4w_ToVc';
const _sb=supabase.createClient(SUPA_URL,SUPA_KEY);

// Redireciona se já autenticado
if(sessionStorage.getItem('soma_auth')==='1') window.location.href='soma-partners.html';

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===(tab==='login'?0:1)));
  document.getElementById('form-login').style.display=tab==='login'?'flex':'none';
  document.getElementById('form-cadastro').style.display=tab==='cadastro'?'flex':'none';
}

function showMsg(id,texto,tipo){
  const el=document.getElementById(id);
  el.textContent=texto;el.className='msg '+tipo;
  if(tipo==='err') setTimeout(()=>el.className='msg hide',4000);
}

function togglePass(id){
  const inp=document.getElementById(id);
  inp.type=inp.type==='password'?'text':'password';
}

async function hashSenha(senha){
  const enc=new TextEncoder().encode(senha);
  const buf=await crypto.subtle.digest('SHA-256',enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function handleLogin(e){
  e.preventDefault();
  const btn=document.getElementById('l-btn');
  btn.disabled=true;btn.textContent='Verificando...';
  const email=document.getElementById('l-email').value.trim().toLowerCase();
  const senha=document.getElementById('l-senha').value;
  const hash=await hashSenha(senha);
  const{data,error}=await _sb.from('soma_usuarios').select('id,nome').eq('email',email).eq('senha_hash',hash).single();
  btn.disabled=false;btn.textContent='ENTRAR';
  if(data){
    sessionStorage.setItem('soma_auth','1');
    sessionStorage.setItem('soma_nome',data.nome||email);
    window.location.href='soma-partners.html';
  } else {
    showMsg('l-msg','E-mail ou senha incorretos','err');
    document.getElementById('l-senha').value='';
    document.getElementById('l-senha').focus();
  }
}

async function handleCadastro(e){
  e.preventDefault();
  const btn=document.getElementById('c-btn');
  const nome=document.getElementById('c-nome').value.trim();
  const email=document.getElementById('c-email').value.trim().toLowerCase();
  const senha=document.getElementById('c-senha').value;
  if(senha.length<6){showMsg('c-msg','Senha deve ter pelo menos 6 caracteres','err');return}
  btn.disabled=true;btn.textContent='Criando conta...';
  // Verifica se e-mail já existe
  const{data:exist}=await _sb.from('soma_usuarios').select('id').eq('email',email).single();
  if(exist){
    showMsg('c-msg','Este e-mail já está cadastrado','err');
    btn.disabled=false;btn.textContent='CRIAR CONTA';return;
  }
  const hash=await hashSenha(senha);
  const id=crypto.randomUUID();
  const{error}=await _sb.from('soma_usuarios').insert({id,email,nome,senha_hash:hash});
  btn.disabled=false;btn.textContent='CRIAR CONTA';
  if(error){showMsg('c-msg','Erro ao criar conta. Tente novamente.','err');return;}
  showMsg('c-msg','Conta criada! Faça login para entrar.','ok');
  setTimeout(()=>{
    document.getElementById('c-nome').value='';
    document.getElementById('c-email').value='';
    document.getElementById('c-senha').value='';
    document.getElementById('l-email').value=email;
    switchTab('login');
  },1800);
}
</script>
</body>
</html>
