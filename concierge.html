<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Concierge — Soma Partners</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0b1e30;--navy-card:#0d2035;--white:#fff;--border:rgba(255,255,255,0.10);--indigo:#4f46e5;--text-muted:rgba(255,255,255,0.55)}
html,body{min-height:100vh;background:var(--navy);font-family:'Montserrat',sans-serif;color:var(--white)}

/* NAV */
.topnav{position:sticky;top:0;z-index:100;background:rgba(11,30,48,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 40px;height:62px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:14px;text-decoration:none;cursor:pointer}
.logo-soma{font-size:18px;font-weight:300;color:#fff;letter-spacing:0.5px}
.logo-pipe{width:1px;height:22px;background:rgba(255,255,255,0.4)}
.logo-partners{font-size:11px;font-weight:700;letter-spacing:5px;color:#fff;text-transform:uppercase}
.nav-right{display:flex;gap:10px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;font-family:'Montserrat',sans-serif;cursor:pointer;border:none;transition:all 0.18s}
.btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none}
.btn-primary{background:var(--indigo);color:#fff}.btn-primary:hover{background:#4338ca}
.btn-outline{background:transparent;color:#fff;border:1px solid var(--border)}.btn-outline:hover{background:rgba(255,255,255,0.08)}
.btn-sm{padding:6px 14px;font-size:12px}

/* PAGE */
.page{padding:48px 40px 60px}
.page-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:36px}
.page-title{font-size:clamp(36px,5vw,58px);font-weight:900;letter-spacing:3px;text-transform:uppercase;line-height:1}
.page-count{font-size:13px;color:var(--text-muted);margin-top:8px}

/* SEARCH */
.search-bar{display:flex;gap:10px;margin-bottom:32px}
.search-dark{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:8px;padding:8px 14px;flex:1;max-width:360px}
.search-dark svg{width:14px;height:14px;stroke:var(--text-muted);stroke-width:2;fill:none;flex-shrink:0}
.search-dark input{background:none;border:none;outline:none;font-family:'Montserrat',sans-serif;font-size:13px;color:#fff;width:100%}
.search-dark input::placeholder{color:var(--text-muted)}
.filter-chip{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--text-muted);cursor:pointer;transition:all 0.18s;font-family:'Montserrat',sans-serif}
.filter-chip:hover,.filter-chip.active{background:var(--indigo);border-color:var(--indigo);color:#fff}

/* CARDS GRID */
.clients-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
@media(max-width:900px){.clients-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){
  .topnav{padding:0 16px;height:54px}
  .page{padding:24px 16px 40px}
  .page-title{font-size:32px;letter-spacing:2px}
  .clients-grid{grid-template-columns:1fr}
  .search-bar{flex-wrap:wrap}
  .nav-right .btn span{display:none}
  .btn-sm{padding:6px 10px}
}

/* CLIENT CARD */
.client-card{position:relative;aspect-ratio:4/3;border-radius:2px;overflow:hidden;cursor:pointer;transition:transform 0.3s,box-shadow 0.3s}
.client-card:hover{transform:translateY(-4px);box-shadow:0 20px 40px rgba(0,0,0,0.4)}
.card-bg{position:absolute;inset:0;background-size:cover;background-position:center top}
.card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(5,15,25,0.92) 0%,rgba(5,15,25,0.4) 55%,rgba(5,15,25,0.10) 100%)}
.card-overlay:hover{background:linear-gradient(to top,rgba(5,15,25,0.80) 0%,rgba(5,15,25,0.25) 55%,rgba(5,15,25,0.05) 100%)}
.card-top{position:absolute;top:14px;right:14px}
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:0.5px;backdrop-filter:blur(8px)}
.sp-ativo{background:rgba(16,185,129,0.2);border:1px solid rgba(16,185,129,0.4);color:#6ee7b7}
.sp-ativo .sp-dot{background:#10b981}
.sp-inativo{background:rgba(148,163,184,0.15);border:1px solid rgba(148,163,184,0.3);color:#94a3b8}
.sp-inativo .sp-dot{background:#94a3b8}
.sp-dot{width:5px;height:5px;border-radius:50%}
.card-body{position:absolute;bottom:0;left:0;right:0;padding:20px 20px 18px}
.card-name{font-size:18px;font-weight:800;letter-spacing:0.5px;margin-bottom:6px;line-height:1.2}
.card-meta{display:flex;gap:14px;align-items:center}
.card-meta-item{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,0.65);font-weight:500}
.card-meta-item svg{width:12px;height:12px;stroke:currentColor;stroke-width:2;fill:none}

/* EMPTY */
.empty-grid{grid-column:1/-1;text-align:center;padding:80px 24px;color:var(--text-muted)}
.empty-icon{width:64px;height:64px;border-radius:16px;background:rgba(255,255,255,0.05);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.empty-icon svg{width:28px;height:28px;stroke:rgba(255,255,255,0.2);stroke-width:1.5;fill:none}
.empty-title{font-size:16px;font-weight:700;color:rgba(255,255,255,0.4);margin-bottom:6px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#0e2338;border:1px solid var(--border);border-radius:16px;width:580px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 30px 60px rgba(0,0,0,0.5)}
.modal-header{padding:24px 28px 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px 8px;border-radius:6px;display:flex;align-items:center}
.modal-close:hover{color:#fff;background:rgba(255,255,255,0.08)}
.modal-close svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none}
.modal-body{padding:20px 28px}
.modal-footer{padding:0 28px 24px;display:flex;gap:10px;justify-content:flex-end}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:11px;font-weight:700;color:rgba(255,255,255,0.45);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.8px}
.form-control{width:100%;padding:10px 12px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:'Montserrat',sans-serif;color:#fff;outline:none;transition:border 0.18s}
.form-control:focus{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(79,70,229,0.15)}
.form-control::placeholder{color:rgba(255,255,255,0.2)}
.form-control option{background:#0f172a;color:#fff}
textarea.form-control{resize:vertical;min-height:72px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* TOAST / LOADER */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:#1e293b;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;font-family:'Montserrat',sans-serif;opacity:0;transition:all 0.3s;z-index:9999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:#7f1d1d}.toast.ok{background:#065f46}
.loader-wrap{position:fixed;inset:0;background:rgba(11,30,48,0.7);display:none;align-items:center;justify-content:center;z-index:5000}
.loader-spin{width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:3px}

/* MEMBROS INLINE */
.membro-form{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:14px;margin-bottom:10px;position:relative}
.membro-form-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.membro-form-num{font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px}
.membro-remove{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.3);font-size:18px;line-height:1;padding:0 4px;transition:color 0.18s}
.membro-remove:hover{color:#fca5a5}
</style>
</head>
<body>

<nav class="topnav">
  <div class="nav-logo" onclick="window.location.href='soma-partners.html'">
    <span class="logo-soma">Soma</span>
    <div class="logo-pipe"></div>
    <span class="logo-partners">Partners</span>
  </div>
  <div class="nav-right">
    <button class="btn btn-outline btn-sm" onclick="window.location.href='relatorios.html'">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
      Relatórios
    </button>
    <button class="btn btn-outline btn-sm" onclick="exportData()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Exportar
    </button>
    <button class="btn btn-primary btn-sm" onclick="openModal()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Novo Cliente
    </button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Clientes</div>
      <div class="page-count" id="page-count">Carregando...</div>
    </div>
  </div>

  <div class="search-bar">
    <div class="search-dark">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" placeholder="Buscar cliente..." oninput="renderGrid()">
    </div>
    <div class="filter-chip active" data-filter="" onclick="setFilter(this,'')">Todos</div>
    <div class="filter-chip" data-filter="ativo" onclick="setFilter(this,'ativo')">Ativos</div>
    <div class="filter-chip" data-filter="inativo" onclick="setFilter(this,'inativo')">Inativos</div>
  </div>

  <div class="clients-grid" id="clients-grid"></div>
</div>

<!-- MODAL NOVO CLIENTE -->
<div class="modal-overlay" id="modal-cliente">
  <div class="modal" style="width:640px">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Nova Família / Projeto</div>
      <button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">

      <!-- NOME DA FAMÍLIA -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Nome da família / projeto *</label>
          <input class="form-control" id="c-nome" placeholder="Ex: Família Silva, Projeto Construção...">
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-control" id="c-status"><option value="ativo">Ativo</option><option value="inativo">Inativo</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Patrimônio estimado</label><input class="form-control" id="c-patrimonio" placeholder="Ex: 2.000.000,00" inputmode="numeric" oninput="fmtPatrimonio(this)"></div>
        <div class="form-group">
          <label class="form-label">Foto da família</label>
          <div style="display:flex;align-items:center;gap:14px">
            <div id="cfoto-preview-wrap" onclick="document.getElementById('c-foto-file').click()" style="width:64px;height:64px;border-radius:50%;border:2px dashed rgba(255,255,255,0.2);cursor:pointer;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.05);transition:border-color 0.18s" title="Clique para escolher foto">
              <img id="cfoto-preview-img" src="" style="width:100%;height:100%;object-fit:cover;display:none">
              <svg id="cfoto-preview-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </div>
            <div style="flex:1">
              <button type="button" onclick="document.getElementById('c-foto-file').click()" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:7px;padding:7px 14px;font-size:12px;font-weight:600;color:#fff;cursor:pointer;font-family:'Montserrat',sans-serif;width:100%;margin-bottom:7px;transition:background 0.18s" onmouseover="this.style.background='rgba(255,255,255,0.12)'" onmouseout="this.style.background='rgba(255,255,255,0.07)'">
                Escolher foto do computador
              </button>
              <input class="form-control" id="c-foto" placeholder="Ou cole uma URL..." style="font-size:11px;padding:7px 10px" oninput="cFotoFromUrl()">
            </div>
          </div>
          <input type="file" id="c-foto-file" accept="image/*" style="display:none" onchange="cFotoUpload(this)">
        </div>
      </div>
      <div class="form-group"><label class="form-label">Endereço</label><input class="form-control" id="c-endereco" placeholder="Rua, número, bairro, cidade, CEP"></div>
      <div class="form-group"><label class="form-label">Observações</label><textarea class="form-control" id="c-obs" rows="2" placeholder="Informações relevantes sobre a família..."></textarea></div>

      <!-- MEMBROS -->
      <div style="border-top:1px solid rgba(255,255,255,0.08);margin:16px 0 14px"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <label class="form-label" style="margin:0">Membros da família</label>
        <button type="button" onclick="addMembroForm()" style="background:rgba(79,70,229,0.2);border:1px solid rgba(79,70,229,0.4);border-radius:6px;padding:5px 12px;font-size:11px;font-weight:700;color:#a5b4fc;cursor:pointer;font-family:'Montserrat',sans-serif;display:flex;align-items:center;gap:5px">
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Adicionar pessoa
        </button>
      </div>
      <div id="membros-form-list"></div>

      <!-- SENHAS -->
      <div style="border-top:1px solid rgba(255,255,255,0.08);margin:16px 0 14px"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <label class="form-label" style="margin:0">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:5px"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Senhas e Acessos
        </label>
        <button type="button" onclick="addSenhaForm()" style="background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.35);border-radius:6px;padding:5px 12px;font-size:11px;font-weight:700;color:#fcd34d;cursor:pointer;font-family:'Montserrat',sans-serif;display:flex;align-items:center;gap:5px">
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Adicionar senha
        </button>
      </div>
      <div id="senhas-form-list"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveCliente()">Salvar</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<div id="loader-wrap" class="loader-wrap"><div class="loader-spin"></div></div>

<script>
const SUPA_URL='https://mdftseanzfganeiyotlf.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1kZnRzZWFuemZnYW5laXlvdGxmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNTcwODgsImV4cCI6MjA5MzgzMzA4OH0.ZUD-vjmF0QX80U6EK4vJK7uek23NzCSTocxSGYH4PDo';
const _sb=supabase.createClient(SUPA_URL,SUPA_KEY);

const GRADS=[
  'linear-gradient(160deg,#1a2e45 0%,#0b1e30 100%)',
  'linear-gradient(160deg,#1e1a40 0%,#0b1e30 100%)',
  'linear-gradient(160deg,#2a1a0f 0%,#0b1e30 100%)',
  'linear-gradient(160deg,#0f2a1a 0%,#0b1e30 100%)',
  'linear-gradient(160deg,#2a0f1a 0%,#0b1e30 100%)',
  'linear-gradient(160deg,#0f1a2a 0%,#0b1e30 100%)',
  'linear-gradient(160deg,#1a2a0f 0%,#0b1e30 100%)',
  'linear-gradient(160deg,#221540 0%,#0b1e30 100%)',
];
function getGrad(name){let h=0;for(let c of(name||'x'))h=(h+c.charCodeAt(0))%GRADS.length;return GRADS[h]}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5)}
function today(){return new Date().toISOString().split('T')[0]}
function fmtDate(d){if(!d)return'—';const[y,m,day]=d.split('-');return`${day}/${m}/${y}`}
function showToast(msg,type='err'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+type;setTimeout(()=>t.className='toast',3000)}
function showLoader(on){document.getElementById('loader-wrap').style.display=on?'flex':'none'}

let clients=[];
let currentFilter='';

async function loadClients(){
  showLoader(true);
  const{data,error}=await _sb.from('concierge_clientes').select('id,data,created_at').order('created_at',{ascending:false});
  if(error){showToast('Erro ao carregar clientes');showLoader(false);return}
  clients=(data||[]).map(r=>({id:r.id,...r.data}));
  renderGrid();
  showLoader(false);
}

function setFilter(el,val){
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');currentFilter=val;renderGrid();
}

function renderGrid(){
  const q=(document.getElementById('search-input').value||'').toLowerCase();
  let list=clients.filter(c=>{
    const mq=(c.nome||'').toLowerCase().includes(q)||(c.email||'').toLowerCase().includes(q);
    const mf=!currentFilter||c.status===currentFilter;
    return mq&&mf;
  });

  document.getElementById('page-count').textContent=`${clients.length} cliente${clients.length!==1?'s':''} cadastrado${clients.length!==1?'s':''}`;

  const grid=document.getElementById('clients-grid');
  if(list.length===0){
    grid.innerHTML=`<div class="empty-grid">
      <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
      <div class="empty-title">Nenhum cliente encontrado</div>
      <div style="font-size:12px">Clique em "Novo Cliente" para cadastrar</div>
    </div>`;
    return;
  }

  grid.innerHTML=list.map(c=>{
    const bg=c.foto?`url('${c.foto}') center/cover no-repeat`:getGrad(c.nome);
    const pgtos=0; // will load lazily
    return`<div class="client-card" onclick="window.location.href='cliente.html?id=${c.id}'">
      <div class="card-bg" style="background:${bg}"></div>
      <div class="card-overlay"></div>
      <div class="card-top">
        <span class="status-pill sp-${c.status||'ativo'}"><span class="sp-dot"></span>${c.status==='inativo'?'Inativo':'Ativo'}</span>
      </div>
      <div class="card-body">
        <div class="card-name">${c.nome}</div>
        <div class="card-meta">
          ${c.email?`<span class="card-meta-item"><svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>${c.email}</span>`:''}

async function saveCliente(){
  const nome=document.getElementById('c-nome').value.trim();
  if(!nome){alert('Informe o nome da família ou projeto');return}
  const id=document.getElementById('edit-id').value||uid();
  const existente = clients.find(c=>c.id===id);
  const record={id,nome,
    status:document.getElementById('c-status').value,
    foto:document.getElementById('c-foto').value.trim(),
    patrimonio:document.getElementById('c-patrimonio')?.value.trim()||'',
    endereco:document.getElementById('c-endereco')?.value.trim()||'',
    obs:document.getElementById('c-obs').value.trim(),
    membros:collectMembros(),
    senhas:collectSenhas(),
    dataCadastro:existente?.dataCadastro||today()};
  const{error}=await _sb.from('concierge_clientes').upsert({id,data:record});
  if(error){showToast('Erro ao salvar');return}
  const idx=clients.findIndex(c=>c.id===id);
  if(idx>=0)clients[idx]=record;else clients.unshift(record);
  autoLeadConcierge(record);
  showToast('Salvo!','ok');closeModal();renderGrid();
}

// ── AUTO-LEAD WEALTH ──
async function autoLeadConcierge(record){
  const membros=record.membros||[];
  const titulares=membros.filter(m=>m.rel==='titular');
  const alvo=titulares.length>0?titulares:[membros[0]].filter(Boolean);
  if(alvo.length===0)return;
  const hoje=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')};
  const{data:rows}=await _sb.from('wealth_leads').select('id,data');
  const existentes=(rows||[]).filter(r=>r.data?.concierge_id===record.id);
  for(const m of alvo){
    const chave=record.id+'::'+m.nome;
    const existing=existentes.find(r=>r.data?.concierge_key===chave);
    const leadId=existing?.id||uid();
    const data={id:leadId,nome:m.nome||record.nome,telefone:m.tel||'',email:m.email||'',cpf:m.cpf||'',
      patrimonio:record.patrimonio||'',origem:'concierge',concierge_id:record.id,concierge_key:chave,
      temperatura:'ativo',estagio:'fechado',responsavel:'',
      data_primeiro_contato:existing?.data?.data_primeiro_contato||hoje(),proxima_acao:'',obs:''};
    await _sb.from('wealth_leads').upsert({id:leadId,data});
  }
}

// ── FOTO UPLOAD ──
function cFotoUpload(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 300;
      let w = img.width, h = img.height;
      if(w > h){ if(w>MAX){h=h*(MAX/w);w=MAX} } else { if(h>MAX){w=w*(MAX/h);h=MAX} }
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const src = canvas.toDataURL('image/jpeg', 0.65);
      document.getElementById('c-foto').value = src;
      setCFotoPreview(src);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function fmtPatrimonio(el){
  let digits = el.value.replace(/\D/g,'');
  if(!digits){el.value='';return;}
  digits = digits.padStart(3,'0');
  const cents = digits.slice(-2);
  const reais = parseInt(digits.slice(0,-2),10)||0;
  el.value = 'R$ ' + reais.toLocaleString('pt-BR') + ',' + cents;
}
function cFotoFromUrl(){ const u=document.getElementById('c-foto').value.trim(); if(u)setCFotoPreview(u); else clearCFotoPreview(); }
function setCFotoPreview(src){ const i=document.getElementById('cfoto-preview-img'),ic=document.getElementById('cfoto-preview-icon'),w=document.getElementById('cfoto-preview-wrap'); i.src=src;i.style.display='block';ic.style.display='none';w.style.borderColor='rgba(79,70,229,0.5)'; }
function clearCFotoPreview(){ const i=document.getElementById('cfoto-preview-img'),ic=document.getElementById('cfoto-preview-icon'),w=document.getElementById('cfoto-preview-wrap'); i.src='';i.style.display='none';ic.style.display='block';w.style.borderColor='rgba(255,255,255,0.2)'; }

function openModal(c=null){
  ['c-nome','c-foto','c-obs','c-patrimonio','c-endereco'].forEach(f=>{const el=document.getElementById(f);if(el)el.value=''});
  document.getElementById('senhas-form-list').innerHTML=''; senhaCount=0;
  clearCFotoPreview();
  document.getElementById('c-status').value='ativo';
  document.getElementById('edit-id').value='';
  document.getElementById('modal-title').textContent='Nova Família / Projeto';
  // Limpa membros
  document.getElementById('membros-form-list').innerHTML='';
  membroCount=0;
  if(c){
    document.getElementById('edit-id').value=c.id;
    document.getElementById('c-nome').value=c.nome||'';
    document.getElementById('c-status').value=c.status||'ativo';
    document.getElementById('c-foto').value=c.foto||'';
    if(c.foto) setCFotoPreview(c.foto); else clearCFotoPreview();
    const _cp=document.getElementById('c-patrimonio');if(_cp){_cp.value=c.patrimonio||'';}
    document.getElementById('c-obs').value=c.obs||'';
    const _cend=document.getElementById('c-endereco');if(_cend)_cend.value=c.endereco||'';
    document.getElementById('modal-title').textContent='Editar Família / Projeto';
    // Recarrega membros existentes
    (c.membros||[]).forEach(m=>addMembroForm(m));
    document.getElementById('senhas-form-list').innerHTML=''; senhaCount=0;
    (c.senhas||[]).forEach(s=>addSenhaForm(s));
  }
  document.getElementById('modal-cliente').classList.add('open');
}
function closeModal(){document.getElementById('modal-cliente').classList.remove('open')}
document.getElementById('modal-cliente').addEventListener('click',e=>{if(e.target===document.getElementById('modal-cliente'))closeModal()});

function exportData(){
  const blob=new Blob([JSON.stringify(clients,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='clientes_soma.json';a.click();
}

<script>
document.addEventListener('input',function(e){
  const el=e.target;
  const skipTypes=['email','password','url','date','time','number','hidden','color','range','file'];
  const skipIds=['email','senha','url','foto','link','login','usuario','pass','user'];
  if(!((el.tagName==='INPUT'&&!skipTypes.includes(el.type))||el.tagName==='TEXTAREA'))return;
  if(el.dataset.noUpper)return;
  if(el.id&&skipIds.some(s=>el.id.includes(s)))return;
  const p=el.selectionStart;el.value=el.value.toUpperCase();
  try{el.setSelectionRange(p,p);}catch(x){}
});
</script>
